<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manpower Management Tool</title>

<!-- External libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#f5f4f1; --bg2:#ece9e3; --white:#fdfcfb;
  --border:#e2ddd6; --border2:#ccc6bc; --border3:#a09890;
  --sh:0 1px 8px rgba(60,50,40,.06); --sh2:0 4px 20px rgba(60,50,40,.11);
  --tx:#1e1b18; --tx2:#5a524a; --tx3:#9a9088;
  --blue:#F05A00; --bl:#eaf0f7; --bm:#b8cce0;
  --green:#3a7d54; --gl:#e8f4ed; --gm:#9ecdb3;
  --red:#a84040; --rl:#f8eded;
  --ora:#C48027; --ol:#f5edd8;
  --yel:#7a5c1e; --yl:#f5eed8;
  --pur:#4e4580; --pl:#eeecf8; --pm:#c0bade;
  --tea:#2d7a7a; --tl:#e0f2f2;
  --amber:#8c6124; --ambl:#f5edd8;
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  --wbs-sep:3px solid #ccc6bc;
  --group-sep:4px solid #a09890;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--bg);color:var(--tx);font-family:var(--font);font-size:13px;display:flex;flex-direction:column;height:100%;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:var(--white);border-bottom:1px solid var(--border2);box-shadow:var(--sh);flex-shrink:0;gap:10px;flex-wrap:wrap;z-index:100;}
.logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;color:var(--tx);}
.logo-ic{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#F05A00,#4e4580);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800;flex-shrink:0;}
.logo-sub{font-size:10px;color:var(--tx3);font-weight:400;margin-top:1px;}
.topbar-r{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;border:1.5px solid var(--border2);background:var(--white);color:var(--tx2);cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;transition:all .14s;white-space:nowrap;line-height:1.2;}
.btn:hover{background:var(--bg2);border-color:var(--blue);color:var(--blue);}
.btn.pri{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn.pri:hover{background:#c04800;}
.btn.soft{background:var(--bl);border-color:var(--bm);color:var(--blue);}
.btn.soft:hover{background:var(--bm);}
.btn.danger{border-color:#f8b4be;color:var(--red);background:var(--rl);}
.btn.lock{background:#f5edd8;border-color:#c8a060;color:#7a5010;}
.btn.unlock{background:var(--gl);border-color:var(--gm);color:var(--green);}
.bic{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:var(--tx3);transition:all .12s;line-height:1;flex-shrink:0;}
.bic:hover{background:var(--bg2);color:var(--tx2);}
.bic.del:hover{background:var(--rl);color:var(--red);border-color:#f8b4be;}

/* ── TABS ── */
.tab-bar{display:flex;align-items:stretch;background:var(--white);border-bottom:2px solid var(--border2);padding:0 16px;gap:1px;overflow-x:auto;flex-shrink:0;}
.tab{display:inline-flex;align-items:center;gap:5px;padding:9px 12px;font-size:12px;font-weight:600;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .14s;user-select:none;}
.tab:hover{color:var(--tx2);background:var(--bg2);}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.tab.tab-bud.active{color:var(--amber);border-bottom-color:var(--amber);}
.tab.tab-cc.active{color:var(--pur);border-bottom-color:var(--pur);}
.tab.tab-wk.active{color:var(--tea);border-bottom-color:var(--tea);}
.tab.tab-as.active{color:var(--pur);border-bottom-color:var(--pur);}
.tdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── RECAP BAR ── */
.recap-bar{display:flex;gap:7px;padding:8px 16px;overflow-x:auto;flex-shrink:0;align-items:stretch;}
.rc{display:flex;align-items:center;gap:9px;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:7px 12px;min-width:112px;box-shadow:var(--sh);flex-shrink:0;}
.ri{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.rl2{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;}
.rv2{font-family:var(--mono);font-size:14px;font-weight:600;margin-top:1px;line-height:1.2;}
.rs2{font-size:10px;color:var(--tx3);}

/* ── PAGE ── */
.page{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative;min-height:0;}
.cc-banner{display:flex;align-items:center;gap:12px;padding:7px 16px;background:linear-gradient(90deg,#f0ede8,#eaf0f7);border-bottom:1px solid var(--border2);flex-shrink:0;flex-wrap:wrap;}
.cc-banner .ctitle{font-weight:700;font-size:13px;color:var(--pur);}
.cc-legend{display:flex;gap:10px;align-items:center;margin-left:auto;flex-wrap:wrap;}
.cl-item{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--tx2);}
.cl-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;}

/* ── BUDGET/CC TABLE ── */
.tw{overflow:auto;flex:1;padding:0 16px 16px;position:relative;min-height:200px;}
table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;margin-top:8px;}
.p1{}
.p2{}
.p3{}
.p4{position:sticky;left:468px;z-index:12;background:inherit;}
.p5{position:sticky;left:540px;z-index:12;background:inherit;border-right:3px solid var(--border3)!important;}
th.p1,td
td.p5,th.p5{border-right:3px solid #8a8070!important;}

/* Row color overrides for sticky cols */
.rg  td.p1,.rg  td.p2,.rg  td.p3,.rg  td.p4{background:#F05A00!important;}
.rg  td.p5{background:#F05A00!important;}
.rg2 td.p1,.rg2 td.p2,.rg2 td.p3,.rg2 td.p4{background:#3a7d54!important;}
.rg2 td.p5{background:#3a7d54!important;}
.rg3 td.p1,.rg3 td.p2,.rg3 td.p3,.rg3 td.p4{background:#f8f4ef!important;}
.rg3 td.p5{background:#f8f4ef!important;}
.rgroup td.p1,.rgroup td.p2,.rgroup td.p3,.rgroup td.p4{background:#d8d2c8!important;}
.rgroup td.p5{background:#d8d2c8!important;}
.rsg td.p1,.rsg td.p2,.rsg td.p3,.rsg td.p4{background:#eae5dc!important;}
.rsg td.p5{background:#eae5dc!important;}
.rbud td.p1,.rbud td.p2,.rbud td.p3,.rbud td.p4{background:#f7f5f2!important;}
.rbud td.p5{background:#f7f5f2!important;}
.rre  td.p1,.rre  td.p2,.rre  td.p3,.rre  td.p4{background:#f3f8f4!important;}
.rre  td.p5{background:#f3f8f4!important;}
.rvar td.p1,.rvar td.p2,.rvar td.p3,.rvar td.p4{background:#f8f6f2!important;}
.rvar td.p5{background:#f8f6f2!important;}
.rwbs td.p1,.rwbs td.p2,.rwbs td.p3,.rwbs td.p4{background:var(--white)!important;}
.rwbs td.p5{background:var(--white)!important;}

/* WBS alternating backgrounds */
.wbs-even .rwbs td,.wbs-even .rbud td,.wbs-even .rre td,.wbs-even .rvar td,.wbs-even .rsubrow td{background-color:#faf9f6!important;}
.wbs-odd  .rwbs td,.wbs-odd  .rbud td,.wbs-odd  .rre td,.wbs-odd  .rvar td,.wbs-odd  .rsubrow td{background-color:#f3f1ec!important;}
.wbs-even .rbud td.p1,.wbs-even .rbud td.p2,.wbs-even .rbud td.p3,.wbs-even .rbud td.p4,.wbs-even .rbud td.p5{background:#f7f5f0!important;}
.wbs-odd  .rbud td.p1,.wbs-odd  .rbud td.p2,.wbs-odd  .rbud td.p3,.wbs-odd  .rbud td.p4,.wbs-odd  .rbud td.p5{background:#eceae4!important;}
.wbs-even .rre  td.p1,.wbs-even .rre  td.p2,.wbs-even .rre  td.p3,.wbs-even .rre  td.p4,.wbs-even .rre  td.p5{background:#f3f8f4!important;}
.wbs-odd  .rre  td.p1,.wbs-odd  .rre  td.p2,.wbs-odd  .rre  td.p3,.wbs-odd  .rre  td.p4,.wbs-odd  .rre  td.p5{background:#ecf5ee!important;}
.wbs-even .rwbs td,.wbs-odd .rwbs td{border-top:2px solid var(--border3)!important;}

thead tr{background:var(--bg2);position:sticky;top:0;z-index:30;}
th::after{content:'';position:absolute;left:0;right:0;bottom:-1px;border-bottom:2px solid var(--border2);pointer-events:none;}
th{padding:0 8px;height:33px;text-align:center;font-family:var(--font);font-size:10px;font-weight:700;color:var(--tx3);border-bottom:2px solid var(--border2);border-right:1px solid var(--border);white-space:nowrap;letter-spacing:.05em;text-transform:uppercase;user-select:none;background:var(--bg2);position:sticky;top:0;z-index:30;}
th.p1,th.p2,th.p3,th.p4,th.p5{z-index:40!important;background:var(--bg2)!important;}
th.col-past{color:var(--tx3);}
th.col-cur{background:var(--pl);color:var(--pur);border-bottom-color:var(--pur);}
th.col-rad{background:var(--ol);color:var(--ora);border-bottom-color:var(--ora);}
td{padding:0 7px;vertical-align:middle;white-space:nowrap;border-right:1px solid var(--border);}

/* ── ROW STYLES ── */
.rg  td{height:30px;background:#F05A00;border-bottom:1px solid #C04800;border-right:1px solid #C04800;color:#1a1a1a;}
.rg2 td{height:30px;background:#3a7d54;border-bottom:1px solid #2a5d3e;border-right:1px solid #2a5d3e;}
.rg3 td{height:30px;background:#f8f4ef;border-bottom:3px solid var(--border2);border-right:1px solid var(--border2);}
.rgroup td{height:36px;background:#d8d2c8;border-top:var(--group-sep);border-bottom:2px solid var(--border3);border-right:1px solid var(--border2);}
.rgroup-first td{border-top:2px solid var(--border2)!important;}
.rsg td{height:31px;background:#e2ddd4;border-bottom:1px solid var(--border3);border-right:1px solid var(--border2);}
.rwbs td{height:26px;background:var(--white);border-top:2px solid var(--border2);border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.rbud td{height:22px;background:#f7f5f2;border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.rre  td{height:22px;background:#f3f8f4;border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.rvar td{height:22px;background:#f8f6f2;border-bottom:2px solid var(--border2);border-right:1px solid var(--border);}
.rwbs-last .rvar td{border-bottom:3px solid var(--border3)!important;}
.sep td{height:2px;background:var(--bg);border:none;}
.group-sep-row td{border-top:4px solid #8a8070!important;background:var(--bg)!important;height:4px!important;}
.wbs-sep-row td{border-top:2px solid #b8b0a4!important;background:var(--bg2)!important;height:3px!important;}
.sg-sep-row td{border-top:3px solid #a09890!important;background:var(--bg)!important;height:3px!important;}

/* ── NUMERICS & CELL TYPES ── */
.num{font-family:var(--mono);font-size:11px;text-align:right;}
.pos{color:var(--green)!important;} .neg{color:var(--red)!important;} .zer{color:var(--tx3)!important;} .mut{color:var(--tx3)!important;}
.edt{cursor:pointer;border-radius:3px;}
.edt:hover{background:rgba(61,90,128,.08)!important;}
td.lk{background:var(--bg2)!important;color:var(--tx3)!important;}
td.col-past-td{background:#f4f4f8!important;}
td.col-cur-td{background:rgba(78,69,128,.10)!important;}
td.col-rad-td{background:rgba(100,116,139,.05)!important;}
td.edt.col-cur-td{border-bottom:2px solid var(--pur)!important;}
td.edt.col-rad-td{border-bottom:2px solid #94a3b8!important;}
td.edt:empty::after{content:'—';color:var(--border2);font-family:var(--mono);font-size:11px;}

/* ── BADGES & PILLS ── */
.cie{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.codb{font-family:var(--mono);font-size:9px;font-weight:600;background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:1px 5px;color:var(--tx3);flex-shrink:0;}
.tp{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:20px;}
.tpb{background:var(--bl);color:var(--blue);}
.tpr{background:var(--gl);color:var(--green);}
.tpv{background:var(--ol);color:var(--ora);}
.tprad{background:var(--yl);color:var(--yel);}

/* ── SPECIALTY PILLS ── */
.spsel{font-family:var(--font);font-size:11px;font-weight:600;border-radius:20px;border:1.5px solid;padding:2px 8px 2px 7px;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;transition:box-shadow .14s;}
.spsel:hover{box-shadow:0 0 0 3px rgba(61,90,128,.12);}
.sk-{background:var(--bg2);color:var(--tx3);border-color:var(--border2);}
.sk-CARP{background:#f5ede0;color:#7a4010;border-color:#c89060;}
.sk-STEEL{background:#e4ecf5;color:#2a4a6a;border-color:#8aacca;}
.sk-HELP{background:#eeecea;color:#4a4440;border-color:#b8b0a8;}
.sk-FINISH{background:#e6f0e4;color:#245a20;border-color:#78b060;}
.sk-DRY{background:#e8f0f5;color:#2a4a6a;border-color:#7a9ec0;}

/* ── MISC ── */
.tog{width:18px;height:18px;border-radius:5px;cursor:pointer;background:var(--white);border:1.5px solid var(--border2);display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:var(--tx3);flex-shrink:0;}
.tog:hover{background:var(--bg2);}
.ar{display:flex;align-items:center;gap:4px;}
.co-sel-wrap{position:relative;display:inline-flex;align-items:center;}
.co-sel-wrap select{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:12px;width:100%;}
.co-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:box-shadow .14s;}
.co-badge:hover{box-shadow:0 0 0 3px rgba(61,90,128,.15);}
.co-badge::after{content:'▾';margin-left:4px;font-size:9px;opacity:.7;}
.add-subrow-btn{font-size:10px;color:var(--blue);cursor:pointer;padding:1px 6px;border-radius:6px;border:1px dashed var(--bm);display:inline-block;margin-left:6px;}
.add-subrow-btn:hover{background:var(--bl);}
.rsubrow td{height:24px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
tr.dragging{opacity:.3;} tr.dov td{border-top:2px solid var(--blue)!important;}
.supervisor-tag{font-size:10px;color:var(--tx3);margin-top:2px;display:flex;align-items:center;gap:4px;}
.supervisor-tag span{font-weight:600;color:var(--tx2);}

/* ── LOCK OVERLAY ── */
.lock-ov{position:absolute;inset:0;background:rgba(242,244,250,.9);display:flex;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(3px);}
.lock-box{background:var(--white);border:2px solid #fcd34d;border-radius:14px;padding:30px 40px;text-align:center;box-shadow:var(--sh2);}
.lock-ic{font-size:38px;margin-bottom:10px;}
.lock-box h3{font-size:15px;font-weight:700;margin-bottom:5px;color:var(--amber);}
.lock-box p{font-size:12px;color:var(--tx2);margin-bottom:18px;line-height:1.5;}

/* ── PIN MODAL ── */
.pin-row{display:flex;gap:8px;justify-content:center;margin-bottom:14px;}
.pin-i{width:46px;height:50px;border-radius:10px;border:2px solid var(--border2);background:var(--bg);font-family:var(--mono);font-size:22px;font-weight:700;text-align:center;color:var(--tx);outline:none;transition:border .14s;}
.pin-i:focus{border-color:var(--amber);background:var(--white);}
.pin-err{font-size:11px;color:var(--red);min-height:16px;margin-bottom:8px;}

/* ── MODAL ── */
.mbg{position:fixed;inset:0;background:rgba(20,25,50,.38);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(5px);padding:2vh 2vw;}
.mbg.fullscreen-picker{padding:0!important;background:rgba(20,25,50,.6);align-items:stretch!important;justify-content:stretch!important;}
.mbg.fullscreen-picker > div{width:100%!important;max-width:100%!important;height:100%!important;max-height:100%!important;border-radius:0!important;margin:0!important;}
.modal{background:var(--white);border:1.5px solid var(--border2);border-radius:14px;padding:22px 26px;min-width:320px;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(66,96,245,.18);animation:mIn .17s ease;}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(5px)}to{opacity:1;transform:none}}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px;}
.modal label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:3px;margin-top:10px;}
.modal input,.modal select,.modal textarea{width:100%;background:var(--bg);border:1.5px solid var(--border2);color:var(--tx);border-radius:7px;padding:7px 10px;font-family:var(--font);font-size:13px;transition:border .13s;}
.modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:var(--blue);background:var(--white);}
.ma{display:flex;justify-content:flex-end;gap:7px;margin-top:16px;}
.tarif-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.tarif-row{display:flex;align-items:center;gap:6px;}
.tarif-row label{font-size:11px;color:var(--tx2);min-width:80px;margin:0;}
.tarif-row input{padding:5px 8px;font-size:12px;}

/* ── CC INVOICE / BOTTOM RECAP ── */
.inv-section{background:var(--white);border-top:2px solid var(--border2);padding:14px 16px;flex-shrink:0;}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.inv-card{background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;}
.inv-card .ic-title{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.inv-row{display:flex;gap:6px;align-items:center;margin-top:5px;}
.inv-row label{font-size:10px;font-weight:600;color:var(--tx2);min-width:55px;}
.inv-row input{flex:1;background:var(--white);border:1.5px solid var(--border2);border-radius:6px;padding:4px 7px;font-family:var(--mono);font-size:12px;color:var(--tx);outline:none;transition:border .13s;}
.inv-row input:focus{border-color:var(--pur);}
.inv-diff{font-family:var(--mono);font-size:11px;margin-top:5px;padding:3px 7px;border-radius:5px;display:inline-block;}
.inv-diff.ok{background:#e8f4ed;color:#2d6040;}
.inv-diff.warn{background:#f8eded;color:#8a3030;}
.bot-recap{background:var(--white);border-top:2px solid var(--border2);padding:12px 16px;flex-shrink:0;overflow-x:auto;}
.bot-title{font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:8px;}
.bot-table{border-collapse:collapse;font-size:11px;min-width:100%;}
.bot-table th{background:var(--bg2);padding:5px 10px;border:1px solid var(--border2);font-size:10px;font-weight:700;color:var(--tx2);text-align:left;white-space:nowrap;}
.bot-table td{padding:5px 10px;border:1px solid var(--border);font-family:var(--mono);font-size:11px;text-align:right;}
.bot-table td:first-child{font-family:var(--font);font-weight:600;text-align:left;color:var(--tx);}
.bot-table tr:nth-child(even) td{background:#f8f6f2;}

/* ── CONTRACT ROWS ── */
.cc-reel-eur-row td{background:#fff8f0!important;}
.cc-rad-hm-row td{background:#fffbf0!important;}
.cc-contract-recap td{background:#f8f4ee!important;font-size:10px;}

/* ── WORKERS TABLE ── */
.wk-table{border-collapse:collapse;width:100%;font-size:12px;}
.wk-table th{background:var(--bg2);padding:6px 10px;border:1px solid var(--border2);font-size:10px;font-weight:700;color:var(--tx2);text-align:left;white-space:nowrap;position:sticky;top:0;z-index:5;}
.wk-table td{padding:5px 10px;border:1px solid var(--border);vertical-align:middle;white-space:nowrap;}
.wk-table tr:nth-child(even) td{background:#f8f6f2;}
.wk-table tr:hover td{background:var(--bg2);}
.wk-table tr.wk-selected td{background:#eaf0f7!important;}
.wk-table tr.wk-selected:hover td{background:#d8e8f4!important;}
input.wk-cb{width:15px;height:15px;cursor:pointer;accent-color:var(--blue);}
.wk-sel-bar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--blue);color:#fff;font-size:12px;font-weight:600;flex-shrink:0;animation:slideDown .15s ease;flex-wrap:wrap;}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.wk-sel-bar .scount{background:rgba(255,255,255,.25);border-radius:20px;padding:2px 10px;font-family:var(--mono);}
.wk-sel-bar .btn{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);color:#fff;font-size:11px;}
.wk-sel-bar .btn:hover{background:rgba(255,255,255,.3);}
.wk-sel-bar .btn.danger{background:rgba(168,64,64,.6);border-color:rgba(255,150,150,.4);}

/* ── STATUS BADGES ── */
.sb{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.sb-ok{background:var(--gl);color:var(--green);}
.sb-warn{background:var(--ol);color:var(--ora);}
.sb-gap{background:var(--rl);color:var(--red);}
.sb-exp{background:#f0e8e8;color:#7a2020;}
.sb-free{background:var(--bg2);color:var(--tx3);}
.ms-dot{width:14px;height:14px;border-radius:50%;display:inline-block;cursor:pointer;border:1.5px solid transparent;transition:transform .1s;}
.ms-dot:hover{transform:scale(1.3);}
.ms-ok{background:var(--green);}
.ms-free{background:#e8b84b;}
.ms-gap{background:var(--red);}
.ms-exp{background:#c0a0a0;}
.ms-out{background:#e8e0d8;}

/* ── ASSIGNMENT GRID ── */
.as-grid{overflow:auto;flex:1;min-height:0;}
.as-table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font-size:11px;}
.as-table th{background:var(--bg2);padding:5px 8px;border-bottom:2px solid var(--border2);border-right:1px solid var(--border);font-size:10px;font-weight:700;color:var(--tx3);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;position:sticky;top:0;z-index:5;}
.as-table th.ap1{position:sticky;left:0;z-index:10;text-align:left;min-width:200px;}
.as-table th.ap2{position:sticky;left:200px;z-index:10;min-width:90px;}
.as-table td{border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:0;vertical-align:top;}
.as-table td.ap1{position:sticky;left:0;z-index:4;background:var(--white);padding:4px 8px;font-weight:600;font-size:11px;}
.as-table td.ap2{position:sticky;left:200px;z-index:4;background:var(--white);padding:4px 8px;text-align:right;}
.as-cell{min-width:64px;min-height:36px;padding:3px 6px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.as-count{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--tx2);text-align:center;line-height:1.2;}
.as-count .n-ass{color:var(--green);}
.as-count .n-miss{color:var(--red);}
.as-count .sep{color:var(--tx3);font-weight:400;}
.as-names{display:none;}
.as-cell[data-tip]:hover::after{content:attr(data-tip);position:fixed;background:#1e1b18;color:#fff;font-size:11px;font-weight:400;padding:6px 10px;border-radius:8px;white-space:pre;z-index:9999;pointer-events:none;max-width:220px;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,.3);top:var(--tip-y,50%);left:var(--tip-x,50%);}
.as-chip{font-size:9px;font-weight:600;padding:2px 6px;border-radius:10px;background:var(--gl);color:var(--green);cursor:pointer;white-space:nowrap;position:relative;user-select:none;}
.as-chip:hover{opacity:.85;}
.as-chip.fm{background:#f0e8d8;color:#7a4a10;border:1.5px solid #c8a060;}
.as-chip.fm::before{content:'★ ';font-size:9px;}
.as-chip.exp{background:var(--rl);color:var(--red);}
.chip-pop{position:fixed;background:var(--white);border:1.5px solid var(--border2);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:500;padding:6px 0;min-width:130px;animation:mIn .1s ease;}
.chip-pop-name{font-size:11px;font-weight:700;color:var(--tx);padding:4px 12px 6px;border-bottom:1px solid var(--border);}
.chip-pop-btn{display:block;width:100%;text-align:left;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--red);font-family:var(--font);}
.chip-pop-btn:hover{background:var(--rl);}
.as-add{font-size:10px;color:var(--blue);cursor:pointer;padding:1px 4px;border-radius:8px;border:1px dashed var(--bm);display:inline-block;margin-top:1px;line-height:1.4;}
.as-add:hover{background:var(--bl);}
.as-alert-red{background:rgba(168,64,64,.12)!important;border-left:3px solid var(--red)!important;}
.as-alert-ora{background:rgba(140,97,36,.10)!important;border-left:3px solid var(--ora)!important;}
.as-alert-ok{background:rgba(58,125,84,.08)!important;border-left:3px solid var(--green)!important;}
.as-cell-sel{background:rgba(61,90,128,.12)!important;outline:2px solid var(--blue)!important;}
.fm-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;color:#7a4a10;background:#f0e8d8;border:1px solid #c8a060;border-radius:10px;padding:1px 5px;}

/* ── WORKER PICKER MODAL ── */
.wk-pick-modal{background:var(--white);border-radius:0;padding:0;width:100%;height:100%;display:flex;flex-direction:column;box-shadow:none;overflow:hidden;}
.wk-pick-header{padding:20px 24px 14px;border-bottom:1px solid var(--border2);flex-shrink:0;}
.wk-pick-header h3{font-size:16px;font-weight:800;color:var(--tx);margin-bottom:4px;}
.wk-pick-header .subtitle{font-size:12px;color:var(--tx3);}
.wk-pick-filters{display:flex;gap:8px;align-items:center;padding:10px 24px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.wk-pick-filters input[type=text]{padding:5px 10px;border:1.5px solid var(--border2);border-radius:7px;font-size:12px;font-family:var(--font);outline:none;width:180px;}
.wk-pick-filters input[type=text]:focus{border-color:var(--blue);}
.wk-pick-legend{display:flex;gap:12px;align-items:center;font-size:11px;font-weight:600;}
.wk-pick-legend span{display:flex;align-items:center;gap:4px;}
.wk-pick-legend .ldot{width:10px;height:10px;border-radius:3px;display:inline-block;}
.wk-pick-body{overflow-y:auto;flex:1;padding:16px 24px;}
.wk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
.wk-card{border:2px solid var(--border2);border-radius:10px;padding:11px 14px;cursor:pointer;transition:border .13s,background .13s,transform .1s;position:relative;}
.wk-card:hover{border-color:var(--blue);background:var(--bl);transform:translateY(-1px);}
.wk-card.wc-staged{border-color:var(--green)!important;background:var(--gl)!important;box-shadow:0 0 0 3px rgba(58,125,84,.35)!important;transform:translateY(-2px)!important;}
.wk-card.wc-staged .wc-name{color:var(--green)!important;}
.wk-card.wc-staged::before{content:'✓';position:absolute;top:6px;right:8px;font-size:16px;font-weight:900;color:var(--green);}
.wk-card.wc-remove{border-color:var(--red)!important;background:var(--rl)!important;box-shadow:0 0 0 3px rgba(168,64,64,.3)!important;}
.wk-card.wc-remove::before{content:'✕';position:absolute;top:6px;right:8px;font-size:14px;font-weight:900;color:var(--red);}
.wk-card.wc-elsewhere{border-color:var(--red);background:var(--rl);opacity:.75;}
.wk-card.wc-out{opacity:.65;cursor:pointer;background:#fff8f0;border-color:#e8c090;}
.wk-card .wc-name{font-weight:700;font-size:12px;color:var(--tx);margin-bottom:3px;}
.wk-card .wc-meta{font-size:10px;color:var(--tx3);}
.wk-card .wc-status{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;display:inline-block;margin-top:5px;}
.wk-pick-footer{padding:14px 24px;border-top:1px solid var(--border2);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--bg2);}
.wk-pick-footer .fp-info{flex:1;font-size:12px;color:var(--tx2);}
.wk-pick-fm-wrap{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--tx2);}

/* ── EXPIRED MONTH CELLS ── */
.as-cell-expired{
  background:repeating-linear-gradient(
    -45deg,
    rgba(0,0,0,.03),
    rgba(0,0,0,.03) 3px,
    transparent 3px,
    transparent 8px
  )!important;
  opacity:.55;
}
/* ── SCROLLBARS ── */
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:#a09888;border-radius:8px;border:2px solid var(--bg2);}
::-webkit-scrollbar-thumb:hover{background:#8a8070;}
::-webkit-scrollbar-corner{background:var(--bg2);}
</style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">
  <div class="logo">
    <div class="logo-ic">M</div>
    <div>
      <div>Manpower Management Tool</div>
      <div class="logo-sub">Man-Month Budget Control</div>
      <div id="projectLabel" style="font-size:10px;color:var(--blue);font-weight:600;margin-top:1px"></div>
    </div>
  </div>
  <div id="syncIndicator" style="font-size:11px;color:var(--tx3);min-width:80px;text-align:right">&#9899; Connecting...</div>
  <div class="topbar-r" id="topbarR"></div>
  <!-- Static file inputs — never recreated on render -->
  <input type="file" id="xlsxInput"      accept=".xlsx,.xls" style="display:none" onchange="handleXLSX(this.files[0])">
  <input type="file" id="wbsImportInput" accept=".xlsx,.xls" style="display:none" onchange="handleWBSXLSX(this.files[0])">
  <input type="file" id="importFileInput" accept=".json"     style="display:none" onchange="importBackup(this.files[0])">
</div>

<!-- ── TABS ── -->
<div class="tab-bar" id="tabBar"></div>

<!-- ── KPI RECAP BAR ── -->
<div class="recap-bar" id="recapBar"></div>

<!-- ── MAIN CONTENT ── -->
<div class="page" id="pageContent"></div>

<!-- ── MODAL BACKDROP ── -->
<div class="mbg" id="mbg" style="display:none">
  <div id="mbox"></div>
</div>

<!-- ── APPLICATION SCRIPT ── -->
<script src="app.js"></script>

</body>
