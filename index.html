<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manpower Followup</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* Warm stone neutrals */
  --bg:#f5f4f1; --bg2:#ece9e3; --white:#fdfcfb;
  --border:#e2ddd6; --border2:#ccc6bc; --border3:#a09890;
  --sh:0 1px 8px rgba(60,50,40,.06); --sh2:0 4px 20px rgba(60,50,40,.11);
  --tx:#1e1b18; --tx2:#5a524a; --tx3:#9a9088;

  /* Slate blue — primary, muted */
  --blue:#3d5a80; --bl:#eaf0f7; --bm:#b8cce0;

  /* Sage green — positive */
  --green:#3a7d54; --gl:#e8f4ed; --gm:#9ecdb3;

  /* Terracotta — negative */
  --red:#a84040; --rl:#f8eded;

  /* Warm amber — ETC / future */
  --ora:#8c6124; --ol:#f5edd8;

  /* Muted gold — EAC */
  --yel:#7a5c1e; --yl:#f5eed8;

  /* Dusty indigo — CC month */
  --pur:#4e4580; --pl:#eeecf8; --pm:#c0bade;

  /* Teal — info */
  --tea:#2d7a7a; --tl:#e0f2f2;

  /* Warm ochre — budget lock */
  --amber:#8c6124; --ambl:#f5edd8;

  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  --wbs-sep:3px solid #ccc6bc;
  --group-sep:4px solid #a09890;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--bg);color:var(--tx);font-family:var(--font);font-size:13px;display:flex;flex-direction:column;height:100%;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:var(--white);border-bottom:1px solid var(--border2);box-shadow:var(--sh);flex-shrink:0;gap:10px;flex-wrap:wrap;z-index:100;}
.logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;color:var(--tx);}
.logo-ic{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#3d5a80,#4e4580);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800;flex-shrink:0;}
.logo-sub{font-size:10px;color:var(--tx3);font-weight:400;margin-top:1px;}
.topbar-r{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;border:1.5px solid var(--border2);background:var(--white);color:var(--tx2);cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;transition:all .14s;white-space:nowrap;line-height:1.2;}
.btn:hover{background:var(--bg2);border-color:var(--blue);color:var(--blue);}
.btn.pri{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn.pri:hover{background:#2d4870;}
.btn.soft{background:var(--bl);border-color:var(--bm);color:var(--blue);}
.btn.soft:hover{background:var(--bm);}
.btn.danger{border-color:#f8b4be;color:var(--red);background:var(--rl);}
.btn.lock{background:#f5edd8;border-color:#c8a060;color:#7a5010;}
.btn.unlock{background:var(--gl);border-color:var(--gm);color:var(--green);}
.bic{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:var(--tx3);transition:all .12s;line-height:1;flex-shrink:0;}
.bic:hover{background:var(--bg2);color:var(--tx2);}
.bic.del:hover{background:var(--rl);color:var(--red);border-color:#f8b4be;}

/* TABS */
.tab-bar{display:flex;align-items:stretch;background:var(--white);border-bottom:2px solid var(--border2);padding:0 16px;gap:1px;overflow-x:auto;flex-shrink:0;}
.tab{display:inline-flex;align-items:center;gap:5px;padding:9px 12px;font-size:12px;font-weight:600;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .14s;user-select:none;}
.tab:hover{color:var(--tx2);background:var(--bg2);}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.tab.tab-bud.active{color:var(--amber);border-bottom-color:var(--amber);}
.tab.tab-cc.active{color:var(--pur);border-bottom-color:var(--pur);}
.tdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* RECAP BAR */
.recap-bar{display:flex;gap:7px;padding:8px 16px;overflow-x:auto;flex-shrink:0;align-items:stretch;}
.rc{display:flex;align-items:center;gap:9px;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:7px 12px;min-width:112px;box-shadow:var(--sh);flex-shrink:0;}
.ri{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.rl2{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;}
.rv2{font-family:var(--mono);font-size:14px;font-weight:600;margin-top:1px;line-height:1.2;}
.rs2{font-size:10px;color:var(--tx3);}

/* PAGE */
.page{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative;}
.cc-banner{display:flex;align-items:center;gap:12px;padding:7px 16px;background:linear-gradient(90deg,#f0ede8,#eaf0f7);border-bottom:1px solid var(--border2);flex-shrink:0;flex-wrap:wrap;}
.cc-banner .ctitle{font-weight:700;font-size:13px;color:var(--pur);}
.cc-legend{display:flex;gap:10px;align-items:center;margin-left:auto;flex-wrap:wrap;}
.cl-item{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--tx2);}
.cl-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;}

/* TABLE */
.tw{overflow:auto;flex:1;padding:0 16px 16px;position:relative;}
table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;margin-top:8px;border-radius:10px;overflow:hidden;}
.p1{position:sticky;left:0;z-index:12;background:inherit;}
.p2{position:sticky;left:260px;z-index:12;background:inherit;}
.p3{position:sticky;left:370px;z-index:12;background:inherit;}
.p4{position:sticky;left:468px;z-index:12;background:inherit;}
/* Budget: 5 sticky cols: Code/WBS | Company | Specialty | PU | TOTAL */
/* CC: 6 sticky cols: Code/WBS | Company | Specialty | BudTotal | ActualCum | Variance */
th.p1,td.p1{background:var(--bg2);}
/* Override for colored rows */
.rg td.p1,.rg td.p2,.rg td.p3,.rg td.p4{background:#3d5a80!important;}
.rg2 td.p1,.rg2 td.p2,.rg2 td.p3,.rg2 td.p4{background:#3a7d54!important;}
.rg3 td.p1,.rg3 td.p2,.rg3 td.p3,.rg3 td.p4{background:#f8f4ef!important;}
.rgroup td.p1,.rgroup td.p2,.rgroup td.p3,.rgroup td.p4{background:#d8d2c8!important;}
.rsg td.p1,.rsg td.p2,.rsg td.p3,.rsg td.p4{background:#eae5dc!important;}
.rbud td.p1,.rbud td.p2,.rbud td.p3,.rbud td.p4{background:#f7f5f2!important;}
.rre td.p1,.rre td.p2,.rre td.p3,.rre td.p4{background:#f3f8f4!important;}
.rvar td.p1,.rvar td.p2,.rvar td.p3,.rvar td.p4{background:#f8f6f2!important;}
.rwbs td.p1,.rwbs td.p2,.rwbs td.p3,.rwbs td.p4{background:var(--white)!important;}
/* Also add a 5th sticky column for CC (Variance) */
.p5{position:sticky;left:540px;z-index:12;background:inherit;}
.rg td.p5{background:#3d5a80!important;}
.rg2 td.p5{background:#3a7d54!important;}
.rg3 td.p5{background:#f8f4ef!important;}
.rgroup td.p5{background:#d8d2c8!important;}
.rsg td.p5{background:#eae5dc!important;}
.rbud td.p5{background:#f7f5f2!important;}
.rre td.p5{background:#f3f8f4!important;}
.rvar td.p5{background:#f8f6f2!important;}
.rwbs td.p5{background:var(--white)!important;}
thead tr{background:var(--bg2);position:sticky;top:0;z-index:20;}
th::after{content:'';position:absolute;left:0;right:0;bottom:-1px;border-bottom:2px solid var(--border2);pointer-events:none;}
th{padding:0 8px;height:33px;text-align:center;font-family:var(--font);font-size:10px;font-weight:700;color:var(--tx3);border-bottom:2px solid var(--border2);border-right:1px solid var(--border);white-space:nowrap;letter-spacing:.05em;text-transform:uppercase;user-select:none;background:var(--bg2);position:sticky;top:0;z-index:15;}
th.p1{text-align:left;z-index:25!important;}
th.col-past{color:var(--tx3);}
th.col-cur{background:var(--pl);color:var(--pur);border-bottom-color:var(--pur);}
th.col-rad{background:var(--ol);color:var(--ora);border-bottom-color:var(--ora);}
td{padding:0 7px;vertical-align:middle;white-space:nowrap;border-right:1px solid var(--border);}

/* === ROW STYLES === */
/* Grand total */
.rg  td{height:30px;background:#3d5a80;border-bottom:1px solid #2e4460;border-right:1px solid #2e4460;}
.rg2 td{height:30px;background:#3a7d54;border-bottom:1px solid #2a5d3e;border-right:1px solid #2a5d3e;}
.rg3 td{height:30px;background:#f8f4ef;border-bottom:3px solid var(--border2);border-right:1px solid var(--border2);}

/* Group header - thick top/bottom border */
.rgroup td{height:36px;background:#d8d2c8;border-top:var(--group-sep);border-bottom:2px solid var(--border3);border-right:1px solid var(--border2);}
.rgroup-first td{border-top:2px solid var(--border2)!important;}

/* Subgroup */
.rsg td{height:28px;background:#eae5dc;border-bottom:1px solid var(--border2);border-right:1px solid var(--border);}

/* WBS header */
.rwbs td{height:26px;background:var(--white);border-top:2px solid var(--border2);border-bottom:1px solid var(--border);border-right:1px solid var(--border);}

/* WBS sub rows */
.rbud td{height:22px;background:#f7f5f2;border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.rre  td{height:22px;background:#f3f8f4;border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.rvar td{height:22px;background:#f8f6f2;border-bottom:2px solid var(--border2);border-right:1px solid var(--border);}

/* Last WBS in group gets a thick bottom */
.rwbs-last .rvar td{border-bottom:3px solid var(--border3)!important;}

.sep td{height:2px;background:var(--bg);border:none;}

/* Numerics */
.num{font-family:var(--mono);font-size:11px;text-align:right;}
.pos{color:var(--green)!important;} .neg{color:var(--red)!important;} .zer{color:var(--tx3)!important;} .mut{color:var(--tx3)!important;}
.edt{cursor:pointer;border-radius:3px;}
.edt:hover{background:rgba(61,90,128,.08)!important;}
td.lk{background:var(--bg2)!important;color:var(--tx3)!important;}
td.col-past-td{background:#f6f7fc!important;}
td.col-cur-td{background:rgba(108,63,245,.06)!important;}
td.col-rad-td{background:rgba(217,119,6,.05)!important;}

/* Badges */
.cie{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.codb{font-family:var(--mono);font-size:9px;font-weight:600;background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:1px 5px;color:var(--tx3);flex-shrink:0;}
.tp{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:20px;}
.tpb{background:var(--bl);color:var(--blue);}
.tpr{background:var(--gl);color:var(--green);}
.tpv{background:var(--ol);color:var(--ora);}
.tprad{background:var(--yl);color:var(--yel);}

/* Specialty select */
.spsel{font-family:var(--font);font-size:11px;font-weight:600;border-radius:20px;border:1.5px solid;padding:2px 8px 2px 7px;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;transition:box-shadow .14s;}
.spsel:hover{box-shadow:0 0 0 3px rgba(61,90,128,.12);}
.sk-{background:var(--bg2);color:var(--tx3);border-color:var(--border2);}
.sk-CARP{background:#f5ede0;color:#7a4010;border-color:#c89060;}
.sk-STEEL{background:#e4ecf5;color:#2a4a6a;border-color:#8aacca;}
.sk-HELP{background:#eeecea;color:#4a4440;border-color:#b8b0a8;}
.sk-FINISH{background:#e6f0e4;color:#245a20;border-color:#78b060;}

.tog{width:18px;height:18px;border-radius:5px;cursor:pointer;background:var(--white);border:1.5px solid var(--border2);display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:var(--tx3);flex-shrink:0;}
.tog:hover{background:var(--bg2);}
.ar{display:flex;align-items:center;gap:4px;}

/* LOCK OVERLAY */
.lock-ov{position:absolute;inset:0;background:rgba(242,244,250,.9);display:flex;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(3px);}
.lock-box{background:var(--white);border:2px solid #fcd34d;border-radius:14px;padding:30px 40px;text-align:center;box-shadow:var(--sh2);}
.lock-ic{font-size:38px;margin-bottom:10px;}
.lock-box h3{font-size:15px;font-weight:700;margin-bottom:5px;color:var(--amber);}
.lock-box p{font-size:12px;color:var(--tx2);margin-bottom:18px;line-height:1.5;}

/* PIN */
.pin-row{display:flex;gap:8px;justify-content:center;margin-bottom:14px;}
.pin-i{width:46px;height:50px;border-radius:10px;border:2px solid var(--border2);background:var(--bg);font-family:var(--mono);font-size:22px;font-weight:700;text-align:center;color:var(--tx);outline:none;transition:border .14s;}
.pin-i:focus{border-color:var(--amber);background:var(--white);}
.pin-err{font-size:11px;color:var(--red);min-height:16px;margin-bottom:8px;}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(20,25,50,.38);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(5px);}
.modal{background:var(--white);border:1.5px solid var(--border2);border-radius:14px;padding:22px 26px;min-width:320px;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(66,96,245,.18);animation:mIn .17s ease;}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(5px)}to{opacity:1;transform:none}}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px;}
.modal label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:3px;margin-top:10px;}
.modal input,.modal select,.modal textarea{width:100%;background:var(--bg);border:1.5px solid var(--border2);color:var(--tx);border-radius:7px;padding:7px 10px;font-family:var(--font);font-size:13px;transition:border .13s;}
.modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:var(--blue);background:var(--white);}
.ma{display:flex;justify-content:flex-end;gap:7px;margin-top:16px;}
.modal-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);border-top:1px solid var(--border);padding-top:10px;margin-top:14px;}
.tarif-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.tarif-row{display:flex;align-items:center;gap:6px;}
.tarif-row label{font-size:11px;color:var(--tx2);min-width:80px;margin:0;}
.tarif-row input{padding:5px 8px;font-size:12px;}

/* CC INVOICE SECTION */
.inv-section{background:var(--white);border-top:2px solid var(--border2);padding:14px 16px;flex-shrink:0;}
.inv-title{font-size:12px;font-weight:700;color:var(--pur);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.inv-card{background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;}
.inv-card .ic-title{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.inv-row{display:flex;gap:6px;align-items:center;margin-top:5px;}
.inv-row label{font-size:10px;font-weight:600;color:var(--tx2);min-width:55px;}
.inv-row input{flex:1;background:var(--white);border:1.5px solid var(--border2);border-radius:6px;padding:4px 7px;font-family:var(--mono);font-size:12px;color:var(--tx);outline:none;transition:border .13s;}
.inv-row input:focus{border-color:var(--pur);}
.inv-diff{font-family:var(--mono);font-size:11px;margin-top:5px;padding:3px 7px;border-radius:5px;display:inline-block;}
.inv-diff.ok{background:#e8f4ed;color:#2d6040;}
.inv-diff.warn{background:#f8eded;color:#8a3030;}

/* BOTTOM RECAP TABLE */
.bot-recap{background:var(--white);border-top:2px solid var(--border2);padding:12px 16px;flex-shrink:0;overflow-x:auto;}
.bot-title{font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:8px;}
.bot-table{border-collapse:collapse;font-size:11px;min-width:100%;}
.bot-table th{background:var(--bg2);padding:5px 10px;border:1px solid var(--border2);font-size:10px;font-weight:700;color:var(--tx2);text-align:left;white-space:nowrap;}
.bot-table td{padding:5px 10px;border:1px solid var(--border);font-family:var(--mono);font-size:11px;text-align:right;}
.bot-table td:first-child{font-family:var(--font);font-weight:600;text-align:left;color:var(--tx);}
.bot-table tr:nth-child(even) td{background:#f8f6f2;}

tr.dragging{opacity:.3;} tr.dov td{border-top:2px solid var(--blue)!important;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}

/* Foreman chip */
.as-chip.fm{background:#f0e8d8;color:#7a4a10;border:1.5px solid #c8a060;}
.as-chip.fm::before{content:'★ ';font-size:9px;}
.fm-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;color:#7a4a10;background:#f0e8d8;border:1px solid #c8a060;border-radius:10px;padding:1px 5px;}
.supervisor-tag{font-size:10px;color:var(--tx3);margin-top:2px;display:flex;align-items:center;gap:4px;}
.supervisor-tag span{font-weight:600;color:var(--tx2);}

/* Picker foreman toggle */
.wpick-fm{display:flex;align-items:center;gap:6px;padding:6px 12px;border-top:1px solid var(--border);font-size:11px;color:var(--tx2);}
.wpick-fm input{margin:0;}

/* ===== WORKERS / ASSIGNMENTS ===== */
.tab.tab-wk.active{color:var(--tea);border-bottom-color:var(--tea);}
.tab.tab-as.active{color:var(--pur);border-bottom-color:var(--pur);}

/* Upload zone */
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;margin:12px 16px;}
.upload-zone:hover{border-color:var(--blue);background:var(--bl);}
.upload-zone.drag{border-color:var(--blue);background:var(--bl);}
.upload-zone p{color:var(--tx3);font-size:13px;margin-top:8px;}

/* Worker table */
.wk-table{border-collapse:collapse;width:100%;font-size:12px;}
.wk-table th{background:var(--bg2);padding:6px 10px;border:1px solid var(--border2);font-size:10px;font-weight:700;color:var(--tx2);text-align:left;white-space:nowrap;position:sticky;top:0;z-index:5;}
.wk-table td{padding:5px 10px;border:1px solid var(--border);vertical-align:middle;white-space:nowrap;}
.wk-table tr:nth-child(even) td{background:#f8f6f2;}
.wk-table tr:hover td{background:var(--bg2);}

/* Status badges */
.sb{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.sb-ok{background:var(--gl);color:var(--green);}
.sb-warn{background:var(--ol);color:var(--ora);}
.sb-gap{background:var(--rl);color:var(--red);}
.sb-exp{background:#f0e8e8;color:#7a2020;}
.sb-free{background:var(--bg2);color:var(--tx3);}

/* Month status dots in worker row */
.ms-dot{width:14px;height:14px;border-radius:50%;display:inline-block;cursor:pointer;border:1.5px solid transparent;transition:transform .1s;}
.ms-dot:hover{transform:scale(1.3);}
.ms-ok{background:var(--green);}
.ms-free{background:#e8b84b;}
.ms-gap{background:var(--red);}
.ms-exp{background:#c0a0a0;}
.ms-out{background:#e8e0d8;}

/* Assignment grid */
.as-grid{overflow:auto;flex:1;}
.as-table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font-size:11px;}

<script>
/* ============================================================
   FIREBASE INIT & SYNC
   ============================================================ */
var firebaseConfig = {
  apiKey: "AIzaSyBouVhL_l0WEYnhjIPx4hVCkQWzEcWwZX0",
  authDomain: "manpower-d45c2.firebaseapp.com",
  projectId: "manpower-d45c2",
  storageBucket: "manpower-d45c2.firebasestorage.app",
  messagingSenderId: "613976432779",
  appId: "1:613976432779:web:5c9fb138ef45157471b48e"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var auth = firebase.auth();
var DOC_PATH = 'manpower/main';
var syncStatus = 'init'; /* init | syncing | ok | error */
var unsubscribe = null;

/* Update sync indicator in topbar */
function setSyncStatus(st, msg){
  syncStatus = st;
  var el = document.getElementById('syncIndicator');
  if(!el) return;
  var icons = {init:'&#9899;', syncing:'&#128260;', ok:'&#9989;', error:'&#128308;'};
  var colors = {init:'var(--tx3)', syncing:'var(--ora)', ok:'var(--green)', error:'var(--red)'};
  el.innerHTML = '<span style="color:'+colors[st]+';font-size:12px">' + icons[st] + ' ' + (msg||st) + '</span>';
}

/* Save to Firestore */
/* Remove undefined/null values recursively — Firestore rejects them */
function cleanForFirestore(obj){
  if(Array.isArray(obj)){
    return obj.map(function(item){return cleanForFirestore(item);}).filter(function(item){return item!==undefined;});
  }
  if(obj&&typeof obj==='object'&&!(obj instanceof Date)){
    var out={};
    Object.keys(obj).forEach(function(k){
      var v=obj[k];
      if(v===undefined||v===null) return; /* skip */
      if(typeof v==='string'&&v==='') return; /* skip empty strings only if top-level keys that cause issues */
      out[k]=cleanForFirestore(v);
    });
    return out;
  }
  return obj;
}

function saveS(){
  /* Always keep localStorage as fallback */
  try{localStorage.setItem('hht8',JSON.stringify(S));}catch(e){}
  if(!db) return;
  setSyncStatus('syncing','Saving...');
  var payload;
  try{
    payload=cleanForFirestore(JSON.parse(JSON.stringify(S)));
  }catch(e){
    console.error('cleanForFirestore error:',e);
    setSyncStatus('error','Data error');
    return;
  }
  console.log('Firebase: saving payload keys:',Object.keys(payload));
  db.doc(DOC_PATH).set(payload)
    .then(function(){ setSyncStatus('ok','Live'); })
    .catch(function(e){
      setSyncStatus('error','Error: '+(e.code||e.message));
      console.error('Firestore save error:',e.code,e.message,e);
    });
}

/* Load from Firestore once, then subscribe to live updates */
function initFirebase(){
  setSyncStatus('init','Connecting...');
  console.log('Firebase: starting auth...');
  auth.signInAnonymously()
    .then(function(cred){
      console.log('Firebase: auth OK, uid=',cred.user.uid);
      setSyncStatus('syncing','Loading...');
      if(unsubscribe) unsubscribe();
      unsubscribe = db.doc(DOC_PATH).onSnapshot(function(snap){
        console.log('Firebase: snapshot received, exists=',snap.exists);
        if(snap.exists){
          var remote = snap.data();
          var migrated = migrate(remote);
          if(migrated){
            S = migrated;
            setSyncStatus('ok','Live');
            render();
          }
        } else {
          setSyncStatus('ok','New project');
          console.log('Firebase: no data yet, saving defaults...');
          saveS();
        }
      }, function(err){
        setSyncStatus('error',err.code||'Sync error');
        console.error('Firestore snapshot error:',err.code,err.message);
      });
    })
    .catch(function(e){
      setSyncStatus('error',e.code||'Auth failed');
      console.error('Firebase auth error:',e.code,e.message);
      /* Fallback to localStorage */
      var local = localStorage.getItem('hht8');
      if(local) try{ S = migrate(JSON.parse(local)) || buildDefault(); }catch(ex){ S = buildDefault(); }
      render();
    });
}

/* ============================================================
   CONSTANTS
   ============================================================ */
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var YEAR=2025; var NM=12; var START_MONTH=0;
/* SPECS is now stored in S.specs and refreshed from there */
var SPECS=[{key:'CARP',label:'Carpenters'},{key:'STEEL',label:'Steelfixers'},{key:'HELP',label:'Helpers'},{key:'FINISH',label:'Finishers'}];
function refreshSpecsFromS(){if(S&&S.specs&&S.specs.length)SPECS=S.specs.slice();}
function specLabel(key){for(var i=0;i<SPECS.length;i++)if(SPECS[i].key===key)return SPECS[i].label;return key||'';}

/* ---- MULTI-YEAR MONTH LIST ---- */
/* ML[i] = {year, month (0-based), label:'Jan 2025', short:'Jan'} */
var ML=[];
function buildML(){
  ML=[];
  var sy=S.settings.startYear||S.settings.year||2025;
  var sm=S.settings.startMonth||0;
  var ey=S.settings.endYear||sy;
  var em=S.settings.endMonth!==undefined?S.settings.endMonth:11;
  var y=sy, m=sm;
  while(y<ey||(y===ey&&m<=em)){
    ML.push({year:y,month:m,label:MONTHS[m]+' '+y,short:MS[m]+(sy!==ey?' '+String(y).slice(2):'')});
    m++;if(m>11){m=0;y++;}
    if(ML.length>120)break; /* safety cap 10 years */
  }
  NM=ML.length;
  YEAR=sy; /* keep for legacy compat */
  START_MONTH=sm;
}

/* Key for storing data: 'y2025m3' */
function mkey(i){
  if(ML&&ML[i]) return 'y'+ML[i].year+'m'+ML[i].month;
  /* fallback when ML not yet built: use start year + month index */
  var sy=S&&S.settings?S.settings.startYear||S.settings.year||2025:2025;
  var sm=S&&S.settings?S.settings.startMonth||0:0;
  var mo=sm+i; var yr=sy;
  while(mo>11){mo-=12;yr++;}
  return 'y'+yr+'m'+mo;
}

/* Legacy compat: data may be stored as b0..b11 (old) or y2025m3 (new) */
function wbsBudAtSlot(w,i){
  var k=mkey(i);
  if(w.data[k]!==undefined) return+(w.data[k]||0);
  /* Try legacy key b<index> (original 12-month single year) */
  if(w.data['b'+i]!==undefined) return+(w.data['b'+i]||0);
  /* Try legacy key b<month> if same year */
  if(ML&&ML[i]){
    var legacy=w.data['b'+ML[i].month];
    if(legacy!==undefined) return+(legacy||0);
  }
  return 0;
}
function setBudSlot(w,i,v){
  /* Always write with mkey — also clear legacy key to avoid double-read */
  var k=mkey(i);
  w.data[k]=v;
  /* Clear old legacy keys so re-render reads the new value */
  delete w.data['b'+i];
  if(ML&&ML[i]) delete w.data['b'+ML[i].month];
}

/* CC data by slot */
function ccSlot(i){
  var k=mkey(i);
  if(!S.ccByKey) S.ccByKey={};
  if(!S.ccByKey[k]) S.ccByKey[k]={reel:{},rad:{},inv:{hrs:0,hm:0,amt:0,note:''}};
  return S.ccByKey[k];
}
function reelAtSlot(w,i){
  if(S.ccM<0||i>S.ccM) return 0;
  var v=ccSlot(i).reel[w.id]; return v!==undefined?+v:0;
}
function radAtSlot(w,i){
  var v=ccSlot(i).rad[w.id]; return v!==undefined?+v:wbsBudAtSlot(w,i);
}
function reelCumSlot(w,page){
  var s=0;
  for(var i=0;i<=Math.min(page,S.ccM);i++) s+=reelAtSlot(w,i);
  return+s.toFixed(2);
}
function ccValSlot(w,i,page){
  if(i<page) return{v:reelAtSlot(w,i),type:'past'};
  if(i===page) return{v:reelAtSlot(w,i),type:'cur'};
  return{v:radAtSlot(w,i),type:'rad'};
}
function addBudgetSlots(w){
  var t=0;for(var i=0;i<NM;i++)t+=wbsBudAtSlot(w,i);return+t.toFixed(2);
}
/* worker active check using ML slot */
function workerActiveInSlot(wk,i){
  if(!ML[i]) return false;
  return workerActiveInMonth(wk,ML[i].month,ML[i].year);
}
function getAssignmentSlot(workerId,i){
  if(!ML[i]) return null;
  for(var k=0;k<S.assignments.length;k++){
    var a=S.assignments[k];
    if(a.workerId===workerId&&a.month===ML[i].month&&a.year===ML[i].year) return a;
  }
  return null;
}

var DEFAULT_PIN='1234';

/* ============================================================
   COMPANY HELPERS
   ============================================================ */
var DEFAULT_COMPANIES=[
  {id:'c1',name:'BIK',    color:'#bl',bg:'var(--bl)',co:'var(--blue)',tarifs:{CARP:0,STEEL:0,HELP:0,FINISH:0,OTHER:0}},
  {id:'c2',name:'LOAN GR',color:'#gl',bg:'var(--gl)',co:'var(--green)',tarifs:{CARP:24,STEEL:24,HELP:18,FINISH:0,OTHER:0}},
  {id:'c3',name:'LOAN BR',color:'#tl',bg:'var(--tl)',co:'var(--tea)',tarifs:{CARP:24,STEEL:24,HELP:18,FINISH:0,OTHER:0}},
  {id:'c4',name:'BRILLANCE',color:'#pl',bg:'var(--pl)',co:'var(--pur)',tarifs:{CARP:0,STEEL:0,HELP:0,FINISH:0,OTHER:0}}
];

function getCompany(id){for(var i=0;i<S.companies.length;i++)if(S.companies[i].id===id)return S.companies[i];return null;}
function getCompanyByName(name){for(var i=0;i<S.companies.length;i++)if(S.companies[i].name===name)return S.companies[i];return null;}
function getPU(companyId,spec){var c=getCompany(companyId);if(!c)return 0;var sk=spec!==undefined&&spec!==''?spec:'OTHER'; var v=c.tarifs[sk];return v!==undefined?v:0;}

/* specLabel defined above */
function uid(){return 'x'+Math.random().toString(36).substr(2,9);}
function ckey(name){return name.replace(/\s/g,'');}
function f1(v){return v?v.toFixed(1):'';}
function f2(v){return v?v.toFixed(2):'';}

/* ============================================================
   DATA MODEL
   ============================================================ */
function makeWBS(id,name,code,parentId,companyId,spec,pu){
  var d={}; /* slot keys set via setBudSlot - legacy b0..b11 still readable */
  return{id:id,name:name,code:code||'',parentId:parentId,companyId:companyId||'',spec:spec||'',pu:pu||0,supervisorId:'',eurOnly:false,data:d};
}

function buildDefault(){
  var cc=[];for(var m=0;m<NM;m++) cc.push({reel:{},rad:{},inv:{hrs:0,hm:0,amt:0,note:''}});

    pin:DEFAULT_PIN,budgetLocked:true,

    groups:[
      {id:'g1',name:'Civil Works',col:false,sub:[{id:'sg1',name:'Foundations',col:false}]},

      {id:'g4',name:'Facade',col:false,sub:[]}
    ],
    wbs:[
      makeWBS('w1','Terrassement','CW-FND-001','sg1','c2','CARP',24),
      makeWBS('w2','Coffrage','CW-FND-002','sg1','c3','STEEL',24),
      makeWBS('w3','Chef de project','IM-001','g2','c3','HELP',18),
      makeWBS('w4','Coordinateur HSE','IM-002','g2','c4','',0),
      makeWBS('w5','Plomberie','TR-MEP-001','sg2','c2','FINISH',0),
      makeWBS('w6','Electricite','TR-MEP-002','sg2','c2','STEEL',24),
      makeWBS('w7','Bardage','FAC-001','g4','c4','CARP',0)
    ],
    cc:cc,ccM:-1,
    workers:[],
    assignments:[],
    suggestions:[],
    specs:[
      {key:'CARP',label:'Carpenters'},
      {key:'STEEL',label:'Steelfixers'},
      {key:'HELP',label:'Helpers'},

    ],
    settings:{startYear:2025,startMonth:0,endYear:2025,endMonth:11}
  };
}

function addBudget(w){return addBudgetSlots(w);}

function migrate(s){
  if(!s||!s.wbs)return null;
  if(!s.pin)s.pin=DEFAULT_PIN;
  if(s.budgetLocked===undefined)s.budgetLocked=true;
  if(!s.companies)s.companies=JSON.parse(JSON.stringify(DEFAULT_COMPANIES));
  if(!s.cc){s.cc=[];for(var m=0;m<NM;m++)s.cc.push({reel:{},rad:{},inv:{hrs:0,hm:0,amt:0,note:''}});}
  for(var m=0;m<NM;m++){if(!s.cc[m])s.cc[m]={reel:{},rad:{},inv:{hrs:0,amt:0,note:''}};if(!s.cc[m].inv)s.cc[m].inv={hrs:0,hm:0,amt:0,note:''};if(s.cc[m].inv.hm===undefined)s.cc[m].inv.hm=0;}
  if(s.ccM===undefined)s.ccM=-1;
  if(!s.workers)s.workers=[];
  if(!s.assignments)s.assignments=[];
  if(!s.suggestions)s.suggestions=[];
  s.wbs.forEach(function(w){
    if(!w.code)w.code='';
    if(w.spec===undefined)w.spec='';
    if(!w.companyId){var c=getCompanyByName(w.company||'');w.companyId=c?c.id:s.companies[0].id;delete w.company;}
    for(var m=0;m<NM;m++)if(w.data['rad'+m]!==undefined)delete w.data['rad'+m];
    if(!w.supervisorId)w.supervisorId='';
  });
  s.assignments.forEach(function(a){if(a.isForeman===undefined)a.isForeman=false;});
  if(!s.specs||!s.specs.length)s.specs=[
    {key:'CARP',label:'Carpenters'},{key:'STEEL',label:'Steelfixers'},
    {key:'HELP',label:'Helpers'},{key:'FINISH',label:'Finishers'}
  ];
  if(!s.settings)s.settings={startYear:2025,startMonth:0,endYear:2025,endMonth:11};
  if(s.settings.startMonth===undefined)s.settings.startMonth=0;
  /* migrate old single-year settings */
  if(s.settings.year&&!s.settings.startYear){s.settings.startYear=s.settings.year;delete s.settings.year;}
  if(!s.settings.endYear)s.settings.endYear=s.settings.startYear||2025;
  if(s.settings.endMonth===undefined)s.settings.endMonth=11;
  /* migrate old cc array to ccByKey */
  if(s.cc&&Array.isArray(s.cc)&&!s.ccByKey){
    s.ccByKey={};
    for(var mi=0;mi<s.cc.length;mi++){
      var yr=s.settings.startYear||2025;
      var mo=(s.settings.startMonth||0)+mi;
      while(mo>11){mo-=12;yr++;}
      var k='y'+yr+'m'+mo;
      s.ccByKey[k]=s.cc[mi];
    }
    delete s.cc;
  }
  if(!s.ccByKey)s.ccByKey={};
  /* migrate workers: add workerId field if missing */
  s.workers.forEach(function(wk){if(!wk.workerId)wk.workerId='';});
  /* migrate WBS: companyId and spec may be empty (EUR-only rows) - that is valid */
  s.wbs.forEach(function(w){if(w.eurOnly===undefined)w.eurOnly=false;});
  return s;
}

/* saveS and loadS replaced by Firebase - see FIREBASE INIT section */
function applySettings(){
  if(!S||!S.settings)return;
  refreshSpecsFromS();
  buildML();
  YEAR=ML.length?ML[0].year:2025;
  START_MONTH=S.settings.startMonth||0;
}

   CC DATA
   ============================================================ */
function bud(w,m){return wbsBudAtSlot(w,m);}
function reel(w,m){return reelAtSlot(w,m);}
function rad(w,m){return radAtSlot(w,m);}
function reelCum(w,page){return reelCumSlot(w,page);}
function ccVal(w,m,page){return ccValSlot(w,m,page);}

/* ============================================================
   STRUCTURE HELPERS
   ============================================================ */
function getAllW(g){
  var r=[];
  for(var i=0;i<S.wbs.length;i++)if(S.wbs[i].parentId===g.id)r.push(S.wbs[i]);
  for(var si=0;si<g.sub.length;si++)for(var i=0;i<S.wbs.length;i++)if(S.wbs[i].parentId===g.sub[si].id)r.push(S.wbs[i]);
  return r;
}
function filterW(pid){return S.wbs.filter(function(w){return w.parentId===pid;});}

/* ============================================================
   VIEW STATE
   ============================================================ */
var VIEW='budget';
function render(){
  /* Preserve scroll position across re-renders */
  var tw=document.querySelector('.tw');
  var _sx=tw?tw.scrollLeft:0, _sy=tw?tw.scrollTop:0;
  var _wx=window.scrollX||0, _wy=window.scrollY||0;

  applySettings();
  if(!document.getElementById('tabBar')) return;
  renderTabBar();renderTopbarR();
  if(VIEW==='budget')renderBudgetPage();
  else if(VIEW==='workers')renderWorkersPage();
  else if(VIEW==='assignments')renderAssignmentsPage();
  else renderCCPage(VIEW);
  saveS();
  wireInvNav();

  /* Restore scroll after DOM rebuild */
  setTimeout(function(){
    var tw2=document.querySelector('.tw');
    if(tw2){tw2.scrollLeft=_sx; tw2.scrollTop=_sy;}
    if(_wx||_wy) window.scrollTo(_wx,_wy);
  },0);
}
/* Wire Tab/Enter navigation on invoice inputs */
function wireInvNav(){
  var inputs=Array.prototype.slice.call(document.querySelectorAll('.inv-row input:not([readonly])'));
  inputs.forEach(function(inp,idx){
    inp.onkeydown=function(e){
      if(e.key==='Enter'||e.key==='Tab'){
        e.preventDefault();
        var next=inputs[idx+1];
        if(next){next.focus();next.select();}
      }
    };
  });
}

/* ============================================================
   TABBAR
   ============================================================ */
function renderTabBar(){
  var h='';
  h+='<div class="tab tab-bud'+(VIEW==='budget'?' active':'')+'" onclick="switchTab(\'budget\')">';
  h+='<span>'+(S.budgetLocked?'&#128274;':'&#128275;')+'</span> Initial Budget</div>';
  for(var m=0;m<NM;m++){
    var ia=VIEW===m;

/* ============================================================
   INVOICE SECTION (CC page)
   ============================================================ */
function renderInvSection(page){
  var inv=ccSlot(page).inv||{hrs:0,hm:0,amt:0,note:''};

  /* --- Calculs HM --- */
  /* Month actual courant */
  var reelMois=0;
  for(var i=0;i<S.wbs.length;i++) reelMois+=reel(S.wbs[i],page);
  reelMois=+reelMois.toFixed(1);

  /* Budget mois courant */
  var budMois=0;
  for(var i=0;i<S.wbs.length;i++) budMois+=bud(S.wbs[i],page);
  budMois=+budMois.toFixed(1);

  /* Reel cumul */
  var reelCumul=0;
  for(var i=0;i<S.wbs.length;i++) for(var m=0;m<=page;m++) reelCumul+=reel(S.wbs[i],m);
  reelCumul=+reelCumul.toFixed(1);

  /* Budget cumulative Jan -> CC month */
  var budCumul=0;
  for(var i=0;i<S.wbs.length;i++) for(var m=0;m<=page;m++) budCumul+=bud(S.wbs[i],m);
  budCumul=+budCumul.toFixed(1);

  /* Budget annuel total (fin de project) */
  var budTotal=0;
  for(var i=0;i<S.wbs.length;i++) budTotal+=addBudget(S.wbs[i]);
  budTotal=+budTotal.toFixed(1);

  /* ETC total (mois suivants) */
  var radTotal=0;
  for(var i=0;i<S.wbs.length;i++) for(var m=page+1;m<NM;m++) radTotal+=rad(S.wbs[i],m);
  radTotal=+radTotal.toFixed(1);

  /* EAC = actual cumulative + ETC */
  var eac=+(reelCumul+radTotal).toFixed(1);

  /* Ecarts HM */
  var ecarMois=+(reelMois-budMois).toFixed(1);
  var ecarCumul=+(reelCumul-budCumul).toFixed(1);
  var ecarFin=+(eac-budTotal).toFixed(1);

  function ecarCls(v){return Math.abs(v)<0.1?'ok':v>0?'warn':'ok';}
  function ecarStr(v){return (v>0?'+':'')+v.toFixed(1)+' HM';}
  function ecarStrAmt(v){return (v>0?'+':'')+Math.round(v)+' EUR';}

  /* Montant calcule = reelMois * PU * 160h */
  var calcAmt=0;
  for(var i=0;i<S.wbs.length;i++) calcAmt+=reel(S.wbs[i],page)*S.wbs[i].pu*160;
  calcAmt=Math.round(calcAmt);
  var hrsEntered=+(inv.hrs||0); var amtEntered=+(inv.amt||0);

  var h='<div class="inv-section">';
  h+='<div class="inv-title"><span class="cl-dot" style="background:var(--pur);width:10px;height:10px;border-radius:3px;display:inline-block"></span>';
  h+='Variance analysis — '+(ML[page]?ML[page].label:MONTHS[page]+' '+YEAR)+'</div>';

  /* === TABLEAU DES ECARTS === */
  h+='<table class="bot-table" style="margin-bottom:12px;width:100%">';
  h+='<thead><tr>';
  h+='<th style="text-align:left">Period</th>';
  h+='<th>Budget MM</th><th>Actual / EAC</th><th>Gap HM</th>';
  h+='<th>Budget EUR</th><th>Actual / EAC EUR</th><th>Gap EUR</th>';
  h+='</tr></thead><tbody>';

  /* Row mensuelle */
  var budMoisEUR=Math.round(budMois*160*(budMois>0?calcAmt/Math.max(reelMois*160,1):0));
  /* Approx EUR par HM = calcAmt / (reelMois * 160) si actual > 0 */
  var puMoy=reelMois>0?calcAmt/(reelMois*160):0;
  var budMoisEUR2=Math.round(budMois*puMoy*160);
  var reelMoisEUR=calcAmt;
  var ecarMoisEUR=reelMoisEUR-budMoisEUR2;
  var ecarMoisHMcls=ecarMois>0?'color:var(--red)':ecarMois<0?'color:var(--green)':'color:var(--tx3)';
  var ecarMoisEURcls=ecarMoisEUR>0?'color:var(--red)':ecarMoisEUR<0?'color:var(--green)':'color:var(--tx3)';

  h+='<tr>';
  h+='<td style="font-weight:700;font-family:var(--font)">Monthly ('+MS[page]+')</td>';
  h+='<td>'+budMois.toFixed(1)+'</td><td style="color:var(--green)">'+reelMois.toFixed(1)+'</td>';
  h+='<td style="font-weight:700;'+ecarMoisHMcls+'">'+(ecarMois>0?'+':'')+ecarMois.toFixed(1)+'</td>';
  h+='<td>'+budMoisEUR2.toLocaleString()+'</td><td style="color:var(--green)">'+reelMoisEUR.toLocaleString()+'</td>';
  h+='<td style="font-weight:700;'+ecarMoisEURcls+'">'+(ecarMoisEUR>0?'+':'')+Math.round(ecarMoisEUR).toLocaleString()+'</td>';
  h+='</tr>';

  /* Row cumulativee */
  var puMoyCum=reelCumul>0?(function(){var s=0;for(var i=0;i<S.wbs.length;i++)for(var m=0;m<=page;m++)s+=reel(S.wbs[i],m)*S.wbs[i].pu*160;return s;})()/Math.max(reelCumul*160,1):0;
  var reelCumulEUR=Math.round((function(){var s=0;for(var i=0;i<S.wbs.length;i++)for(var m=0;m<=page;m++)s+=reel(S.wbs[i],m)*S.wbs[i].pu*160;return s;})());
  var budCumulEUR=Math.round((function(){var s=0;for(var i=0;i<S.wbs.length;i++)for(var m=0;m<=page;m++)s+=bud(S.wbs[i],m)*S.wbs[i].pu*160;return s;})());
  var ecarCumulEUR=reelCumulEUR-budCumulEUR;
  var ecarCumHMcls=ecarCumul>0?'color:var(--red)':ecarCumul<0?'color:var(--green)':'color:var(--tx3)';
  var ecarCumEURcls=ecarCumulEUR>0?'color:var(--red)':ecarCumulEUR<0?'color:var(--green)':'color:var(--tx3)';

  h+='<tr style="background:#f5f3ef">';
  h+='<td style="font-weight:700;font-family:var(--font)">Cumulative (Jan — '+MS[page]+')</td>';
  h+='<td>'+budCumul.toFixed(1)+'</td><td style="color:var(--green)">'+reelCumul.toFixed(1)+'</td>';
  h+='<td style="font-weight:700;'+ecarCumHMcls+'">'+(ecarCumul>0?'+':'')+ecarCumul.toFixed(1)+'</td>';
  h+='<td>'+budCumulEUR.toLocaleString()+'</td><td style="color:var(--green)">'+reelCumulEUR.toLocaleString()+'</td>';
  h+='<td style="font-weight:700;'+ecarCumEURcls+'">'+(ecarCumulEUR>0?'+':'')+Math.round(ecarCumulEUR).toLocaleString()+'</td>';
  h+='</tr>';

  /* Row fin de project */
  var eacEUR=Math.round((function(){
    var s=0;
    for(var i=0;i<S.wbs.length;i++){
      for(var m=0;m<=page;m++) s+=reel(S.wbs[i],m)*S.wbs[i].pu*160;
      for(var m=page+1;m<NM;m++) s+=rad(S.wbs[i],m)*S.wbs[i].pu*160;
    }
    return s;
  })());
  var budTotalEUR=Math.round((function(){var s=0;for(var i=0;i<S.wbs.length;i++)for(var m=0;m<NM;m++)s+=bud(S.wbs[i],m)*S.wbs[i].pu*160;return s;})());
  var ecarFinEUR=eacEUR-budTotalEUR;
  var ecarFinHMcls=ecarFin>0?'color:var(--red)':ecarFin<0?'color:var(--green)':'color:var(--tx3)';
  var ecarFinEURcls=ecarFinEUR>0?'color:var(--red)':ecarFinEUR<0?'color:var(--green)':'color:var(--tx3)';

  h+='<tr style="background:var(--yl);font-weight:700">';
  h+='<td style="font-weight:700;font-family:var(--font);color:var(--yel)">At Completion (EAC)</td>';
  h+='<td style="color:var(--tx2)">'+budTotal.toFixed(1)+'</td><td style="color:var(--yel)">'+eac.toFixed(1)+'</td>';
  h+='<td style="font-weight:700;'+ecarFinHMcls+'">'+(ecarFin>0?'+':'')+ecarFin.toFixed(1)+'</td>';
  h+='<td style="color:var(--tx2)">'+budTotalEUR.toLocaleString()+'</td><td style="color:var(--yel)">'+eacEUR.toLocaleString()+'</td>';
  h+='<td style="font-weight:700;'+ecarFinEURcls+'">'+(ecarFinEUR>0?'+':'')+Math.round(ecarFinEUR).toLocaleString()+'</td>';
  h+='</tr>';

  h+='</tbody></table>';

  /* === SAISIE FACTURE === */
  h+='<div style="font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">Invoice / Payroll entry</div>';
  h+='<div class="inv-grid">';

  var hmEntered=+(inv.hm||0);
  /* sync: if hrs entered but hm is 0, derive hm; vice-versa */
  var hmDisplay=hmEntered||+(hrsEntered/160).toFixed(2);
  var hrsDisplay=hrsEntered||+(hmEntered*160).toFixed(1);
  var diffHrs=+(hrsDisplay-reelMois*160).toFixed(1);
  var diffHM=+(hmDisplay-reelMois).toFixed(2);
  var diffAmt=+(amtEntered-calcAmt);
  var diffHrsCls=Math.abs(diffHrs)>8?'warn':'ok';
  var diffAmtCls=Math.abs(diffAmt)>500?'warn':'ok';

  /* Hours + HM side by side */
  h+='<div class="inv-card" style="grid-column:span 2"><div class="ic-title">Billed quantities</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  /* Hours */
  h+='<div>';
  h+='<div style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Hours</div>';
  h+='<div class="inv-row"><label>Billed (h)</label><input type="number" step="0.5" placeholder="ex: 1280" value="'+(hrsEntered||'')+'" onchange="saveInvHrs('+page+',this.value)" title="Entering hours auto-updates MM"></div>';
  var assignedCount=0;for(var xi=0;xi<S.assignments.length;xi++){if(S.assignments[xi].month===page&&S.assignments[xi].year===YEAR)assignedCount++;}
  var expectedHrs=(assignedCount*160);
  h+='<div class="inv-row"><label>Expected (h)</label><input type="number" readonly value="'+expectedHrs+'" style="color:var(--blue);cursor:default" title="Assigned workers ('+assignedCount+') x 160h"></div>';
  h+='<div class="inv-diff '+diffHrsCls+'">Gap: '+(diffHrs>0?'+':'')+diffHrs+' h</div>';
  h+='</div>';
  /* Hommes-mois */
  h+='<div>';
  h+='<div style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Man-months</div>';
  h+='<div class="inv-row"><label>Billed (MM)</label><input type="number" step="0.01" placeholder="ex: 8.0" value="'+(hmEntered||'')+'" onchange="saveInvHM('+page+',this.value)" title="Entering MM auto-updates hours"></div>';
  h+='<div class="inv-row"><label>Expected (MM)</label><input type="number" readonly value="'+assignedCount+'" style="color:var(--blue);cursor:default" title="Assigned workers count"></div>';
  h+='<div class="inv-diff '+diffHrsCls+'">Gap: '+(diffHM>0?'+':'')+diffHM+' HM</div>';
  h+='</div>';
  h+='</div></div>';

  /* Invoice per company */
  for(var ci=0;ci<S.companies.length;ci++){
    var coi=S.companies[ci];
    /* Calculated = workers assigned to WBS of this company * their PU * 160h */
    var calcAmtCo=0;
    for(var xi=0;xi<S.assignments.length;xi++){
      var ai=S.assignments[xi];
      if(ai.month!==page||ai.year!==YEAR) continue;
      var wkAss=getWorker(ai.workerId);
      if(!wkAss||wkAss.companyId!==coi.id) continue;
      /* find PU from WBS */
      var wbsAss=null;for(var xj=0;xj<S.wbs.length;xj++){if(S.wbs[xj].id===ai.wbsId){wbsAss=S.wbs[xj];break;}}
      var puAss=wbsAss?wbsAss.pu:0;
      calcAmtCo+=puAss*160;
    }
    calcAmtCo=Math.round(calcAmtCo);
    if(calcAmtCo===0) continue; /* skip companies with no activity */
    var invKey='amt_'+coi.id;
    var amtCo=+(inv[invKey]||0);
    var diffCo=+(amtCo-calcAmtCo);
    var diffCoSt=Math.abs(diffCo)>200?'warn':'ok';
    h+='<div class="inv-card"><div class="ic-title">Amount — '+coi.name+'</div>';
    h+='<div class="inv-row"><label>Invoice</label><input type="number" step="100" placeholder="0" value="'+(amtCo||'')+'" onchange="saveInvCo('+page+',\''+coi.id+'\',this.value)"></div>';
    h+='<div class="inv-row"><label>Calculated</label><input type="number" readonly value="'+calcAmtCo+'" style="color:var(--blue);cursor:default" title="Assigned workers of '+coi.name+' x PU x 160h"></div>';
    h+='<div class="inv-diff '+diffCoSt+'">Gap: '+(diffCo>0?'+':'')+diffCo+' EUR</div></div>';
  }

  h+='<div class="inv-card"><div class="ic-title">Note / Reference</div>';
  h+='<textarea rows="3" style="resize:vertical;font-size:12px;padding:6px 8px;border-radius:7px;border:1.5px solid var(--border2);width:100%;outline:none;font-family:var(--font)" onchange="saveInv('+page+',\'note\',this.value)" placeholder="Invoice ref, notes..">'+(inv.note||'')+'</textarea></div>';
  h+='</div></div>';
  return h;
}

function saveInv(page,key,val){ccSlot(page).inv[key]=key==='note'?val:+(parseFloat(val)||0).toFixed(key==='hrs'?1:key==='hm'?2:0);saveS();}
function saveInvHrs(page,val){
  var h=parseFloat(val)||0;
  ccSlot(page).inv.hrs=+h.toFixed(1);
  ccSlot(page).inv.hm=+(h/160).toFixed(2);
  render();
}
function saveInvHM(page,val){
  var hm=parseFloat(val)||0;
  ccSlot(page).inv.hm=+hm.toFixed(2);
  ccSlot(page).inv.hrs=+(hm*160).toFixed(1);
  render();
}
function saveInvCo(page,coId,val){
  ccSlot(page).inv['amt_'+coId]=+(parseFloat(val)||0).toFixed(0);
  saveS();
}

/* ============================================================
   BOTTOM RECAP TABLE (CC page)
   ============================================================ */
function renderBotRecap(page){
  var h='<div class="bot-recap">';
  h+='<div class="bot-title">Workers summary — '+(ML[page]?ML[page].label:MONTHS[page]+' '+YEAR)+'</div>';
  h+='<table class="bot-table">';
  h+='<thead><tr><th>Category</th><th>Budget MM</th><th>Actual MM</th><th>Variance</th>';
  for(var i=0;i<SPECS.length-1;i++) h+='<th>'+SPECS[i].label+'</th>';
  h+='</tr></thead><tbody>';

  /* By company */
  h+='<tr><td colspan="'+(4+SPECS.length-1)+'" style="background:var(--bg2);font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.06em;text-transform:uppercase">By Company</td></tr>';
  for(var ci=0;ci<S.companies.length;ci++){
    var co=S.companies[ci]; var cWbs=S.wbs.filter(function(w){return w.companyId===co.id;});
    if(!cWbs.length) continue;
    var tB2=0,tR2=0;for(var i=0;i<cWbs.length;i++){tB2+=addBudget(cWbs[i]);tR2+=reelCum(cWbs[i],page);}

/* ============================================================
   EDIT CELLS with keyboard navigation
   ============================================================ */
/* Collect all editable cells in current table */
function getEdtCells(){return Array.prototype.slice.call(document.querySelectorAll('td.edt'));}

/* ---- clipboard for copy-paste between cells ---- */
var CELL_CLIPBOARD=null;

/* Read current saved value for a td.edt cell from S */
function readCellVal(td){
  var wid=td.dataset.wid, type=td.dataset.type, mi=+td.dataset.m;
  if(type==='bud'){
    for(var i=0;i<S.wbs.length;i++) if(S.wbs[i].id===wid) return wbsBudAtSlot(S.wbs[i],mi);
  } else if(type==='cc-reel'){
    return reelAtSlot({id:wid},mi);
  } else if(type==='cc-rad'){
    return radAtSlot({id:wid},mi);
  }
  return 0;
}

/* Write a value for a td.edt cell into S (no render) */
function writeCellVal(td,v){
  var wid=td.dataset.wid, type=td.dataset.type, mi=+td.dataset.m;
  if(type==='bud'){
    for(var i=0;i<S.wbs.length;i++) if(S.wbs[i].id===wid){setBudSlot(S.wbs[i],mi,v);break;}
  } else if(type==='cc-reel'){
    ccSlot(mi).reel[wid]=v;
  } else if(type==='cc-rad'){
    ccSlot(mi).rad[wid]=v;
  }
}

function borderForType(type){
  return type==='bud'?'var(--blue)':type==='cc-reel'?'var(--pur)':'var(--ora)';
}

function openInput(td,val,borderCol,onSave){
  if(td.querySelector('input')) return;
  td.innerHTML='';
  var inp=document.createElement('input');
  inp.type='number'; inp.step='0.1'; inp.min='0'; inp.value=(val!=null&&val!==''?val:'');
  inp.style.cssText='width:100%;background:rgba(61,90,128,.08);border:1.5px solid '+borderCol+
    ';border-radius:3px;padding:2px 4px;font-family:var(--mono);font-size:11px;'+
    'color:var(--tx);text-align:right;outline:none;';
  td.appendChild(inp);
  inp.focus(); inp.select();

  var committed=false;

  function saveValue(){
    if(committed) return true;
    committed=true;
    var v=parseFloat(inp.value);
    onSave(isNaN(v)?0:+v.toFixed(1));
    return true;
  }

  function openCell(targetTd){
    /* Save current, update display of current td in-place, open next */
    saveValue();
    /* Update the text of the current td so the value is visible */
    var savedV=readCellVal(td);
    td.innerHTML=savedV?savedV.toFixed(1):'';
    var nval=readCellVal(targetTd);
    var nBorder=borderForType(targetTd.dataset.type);
    openInput(targetTd,nval,nBorder,function(v2){writeCellVal(targetTd,v2);});
  }

  inp.addEventListener('keydown',function(e){
    if(e.key==='Tab'||e.key==='Enter'){
      e.preventDefault(); e.stopPropagation();
      var cells=getEdtCells();
      var idx=cells.indexOf(td);
      /* Tab: right (forward). Shift+Tab: left (backward). Enter: right. */
      var dir=(e.shiftKey&&e.key==='Tab')?-1:1;
      var next=cells[idx+dir];
      if(next){
        openCell(next);
      } else {
        saveValue();
        render();
      }
      return;
    }
    /* Ctrl/Cmd + C: copy cell value to clipboard */
    if((e.ctrlKey||e.metaKey)&&e.key==='c'){
      CELL_CLIPBOARD=parseFloat(inp.value)||0;
      /* flash border green to confirm */
      inp.style.borderColor='var(--green)';
      setTimeout(function(){inp.style.borderColor=borderCol;},400);
      return;
    }
    /* Ctrl/Cmd + V: paste clipboard value */
    if((e.ctrlKey||e.metaKey)&&e.key==='v'&&CELL_CLIPBOARD!==null){
      e.preventDefault();
      inp.value=CELL_CLIPBOARD;
      inp.select();
      return;
    }
    if(e.key==='Escape'){committed=true; render();}
  });

  /* Right-click context menu on td for copy/paste */
  td.oncontextmenu=function(e){
    e.preventDefault();
    /* save current value silently */
    var curV=parseFloat(inp.value)||0;
    writeCellVal(td,curV);
    CELL_CLIPBOARD=curV;
    /* show tiny toast */
    var t=document.createElement('div');
    t.textContent='Copied: '+curV;
    t.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e1b18;color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;z-index:9999;pointer-events:none;opacity:1;transition:opacity .4s';
    document.body.appendChild(t);
    setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove();},400);},800);
  };

  inp.addEventListener('blur',function(){
    setTimeout(function(){
      if(committed) return;
      var active=document.activeElement;
      if(active&&active.closest&&active.closest('td.edt')) return;
      /* Leaving the table entirely: save, update display in-place, then render */
      saveValue();
      var dv=readCellVal(td);
      td.innerHTML=dv?dv.toFixed(1):'';
      render();
    },30);
  });
}

function ecBud(td,wid,m,cur){
  var w=null;for(var i=0;i<S.wbs.length;i++){if(S.wbs[i].id===wid){w=S.wbs[i];break;}}if(!w)return;
  openInput(td,cur,'var(--blue)',function(v){setBudSlot(w,m,v);});
}

function ecCC(td,wid,m,type,cur){
  var borderCol=type==='reel'?'var(--pur)':'var(--ora)';
  openInput(td,cur,borderCol,function(v){
    if(type==='reel')ccSlot(m).reel[wid]=v;
    else ccSlot(m).rad[wid]=v;
  });
}

/* Paste clipboard to any edt cell by clicking it while holding Alt */
document.addEventListener('click',function(e){
  if(!e.altKey) return;
  var td=e.target.closest('td.edt');
  if(!td||CELL_CLIPBOARD===null) return;
  e.preventDefault(); e.stopPropagation();
  writeCellVal(td,CELL_CLIPBOARD);
  /* flash */
  td.style.background='rgba(58,125,84,.25)';
  setTimeout(function(){td.style.background='';render();},200);
},true);

/* ============================================================
   COLLAPSE / DRAG
   ============================================================ */
function tog(type,id){
  if(type==='G'){for(var i=0;i<S.groups.length;i++){if(S.groups[i].id===id){S.groups[i].col=!S.groups[i].col;break;}}}
  else{for(var i=0;i<S.groups.length;i++){for(var j=0;j<S.groups[i].sub.length;j++){if(S.groups[i].sub[j].id===id){S.groups[i].sub[j].col=!S.groups[i].sub[j].col;break;}}}}
  render();
}
function drag(t,id){return 'draggable="true" ondragstart="ds(event,\''+t+'\',\''+id+'\')" ondragover="dov(event)" ondrop="dop(event,\''+t+'\',\''+id+'\')" ondragleave="dlv(event)"';}
var DD=null;
function ds(e,t,id){DD={t:t,id:id};setTimeout(function(){var r=e.target.closest('tr');if(r)r.classList.add('dragging');},0);}
function dov(e){e.preventDefault();var r=e.currentTarget.closest('tr');if(r)r.classList.add('dov');}
function dlv(e){var r=e.currentTarget.closest('tr');if(r)r.classList.remove('dov');}
function dop(e,tt,tid){
  e.preventDefault();
  document.querySelectorAll('.dov,.dragging').forEach(function(el){el.classList.remove('dov');el.classList.remove('dragging');});
  if(!DD)return;
  function mv(arr,sid,did){var si=-1,di=-1;for(var i=0;i<arr.length;i++){if(arr[i].id===sid)si=i;if(arr[i].id===did)di=i;}if(si!==-1&&di!==-1&&si!==di){var it=arr.splice(si,1)[0];arr.splice(di,0,it);}}
  if(DD.t==='W'&&tt==='W')mv(S.wbs,DD.id,tid);
  else if(DD.t==='G'&&tt==='G')mv(S.groups,DD.id,tid);
  DD=null; render();
}

function changeSpec(wid,sel){

  for(var i=0;i<S.wbs.length;i++){
    if(S.wbs[i].id===wid){
      S.wbs[i].spec=spec;
      /* auto-update PU from company tarif */
      var pu=getPU(S.wbs[i].companyId,spec);
      if(pu>0)S.wbs[i].pu=pu;
      break;
    }
  }
  sel.className='spsel sk-'+spec; saveS();
}

/* Parse a date value from Excel/SheetJS: can be JS Date, serial number, or string DD/MM/YYYY */
function parseDate(v){
  if(!v) return null;
  if(v instanceof Date) return v;
  if(typeof v==='number'){
    /* Excel serial date (SheetJS raw mode) */
    var d=new Date(Math.round((v-25569)*86400*1000));
    return d;
  }
  if(typeof v==='string'){
    /* Try DD/MM/YYYY */
    var p=v.trim().split('/');
    if(p.length===3) return new Date(+p[2],+p[1]-1,+p[0]);
    /* Try YYYY-MM-DD */
    var d2=new Date(v);
    return isNaN(d2)?null:d2;
  }
  return null;
}

function fmtDate(d){
  if(!d) return '';
  return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();
}

/* Effective end date: revised if set, else original */
function effectiveEnd(wk){return wk.dateFinRevisee||wk.dateFinContrat;}

/* Is a worker active during month m (0-based) of given year? */
function workerActiveInMonth(wk,m,yr){
  if(yr===undefined) yr=YEAR;
  var first=new Date(yr,m,1);
  var last=new Date(yr,m+1,0); /* last day of month */
  var start=wk.dateDebut?new Date(wk.dateDebut):null;
  var end=effectiveEnd(wk)?new Date(effectiveEnd(wk)):null;
  if(start&&first<start) return false;
  if(end&&last>end) return false;
  return true;
}

/* Get assignment for a worker in month m */
function getAssignment(workerId,m){
  for(var i=0;i<S.assignments.length;i++){
    var a=S.assignments[i];
    if(a.workerId===workerId&&a.month===m&&a.year===YEAR) return a;
  }
  return null;
}

/* Get all workers assigned to a WBS in month m */
function getWBSWorkers(wbsId,slotIdx){
  var res=[];
  var yr=ML[slotIdx]?ML[slotIdx].year:YEAR;
  var mo=ML[slotIdx]!==undefined?ML[slotIdx].month:slotIdx;
  for(var i=0;i<S.assignments.length;i++){
    var a=S.assignments[i];
    if(a.wbsId===wbsId&&a.month===mo&&a.year===yr){
      var wk=getWorker(a.workerId);
      if(wk) res.push(wk);
    }
  }
  return res;
}

function getWorker(id){
  for(var i=0;i<S.workers.length;i++) if(S.workers[i].id===id) return S.workers[i];
  return null;
}

/* Worker status for a given month */
function workerMonthStatus(wk,m,yr){
  if(yr===undefined) yr=YEAR;
  var active=workerActiveInMonth(wk,m,yr);
  if(!active) return 'out'; /* outside contract */
  var a=getAssignment(wk.id,m);
  if(a) return 'ok'; /* assigned */
  /* Check if contract ends this month or next — gap alert */
  var end=effectiveEnd(wk);
  if(end){
    var endDate=new Date(end);
    var monthEnd=new Date(YEAR,m+1,0);
    var twoMonthsLater=new Date(YEAR,m+2,0);
    if(endDate<=twoMonthsLater) return 'gap'; /* contract ending soon, not assigned */
  }
  return 'free';
}

/* Global worker status (worst across active months) */
function workerGlobalStatus(wk){
  var hasGap=false,hasExpired=false;
  var now=new Date();
  var end=effectiveEnd(wk);
  if(end&&new Date(end)<now) return 'exp';
  for(var m=0;m<NM;m++){
    var st=workerMonthStatus(wk,m);
    if(st==='gap') hasGap=true;
  }
  if(hasGap) return 'gap';
  return 'ok';
}

/* ============================================================
   FOREMAN / SUPERVISOR HELPERS
   ============================================================ */
function getForeman(wbsId,slotIdx){
  var yr=ML[slotIdx]?ML[slotIdx].year:YEAR;
  var mo=ML[slotIdx]!==undefined?ML[slotIdx].month:slotIdx;
  for(var i=0;i<S.assignments.length;i++){
    var a=S.assignments[i];
    if(a.wbsId===wbsId&&a.month===mo&&a.year===yr&&a.isForeman) return a;
  }
  return null;
}

function getSupervisorName(wbs){
  if(!wbs.supervisorId) return '';
  var wk=getWorker(wbs.supervisorId);
  return wk?wk.name:wbs.supervisorId;
}

/* When assigning as foreman: clear any previous foreman on same WBS/month */
function assignWorker(workerId,wbsId,slotIdx,isForeman){
  var aYr=ML[slotIdx]?ML[slotIdx].year:YEAR;
  var aMo=ML[slotIdx]!==undefined?ML[slotIdx].month:slotIdx;
  if(isForeman){
    for(var i=0;i<S.assignments.length;i++){
      if(S.assignments[i].wbsId===wbsId&&S.assignments[i].month===aMo&&S.assignments[i].year===aYr)
        S.assignments[i].isForeman=false;
    }
  }
  S.assignments.push({workerId:workerId,wbsId:wbsId,month:aMo,year:aYr,isForeman:!!isForeman});
}

/* ============================================================
   EXCEL IMPORT
   ============================================================ */
function handleXLSX(file){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array',cellDates:true});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:'DD/MM/YYYY'});
      importWorkers(rows);
    }catch(err){
      alert('Error reading file: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

/* Expected columns (row 0 = header, flexible order):
   Name, Company, Specialty, Contract Start, Contract End, Revised End */
function importWorkers(rows){
  if(!rows||rows.length<2){alert('Empty file or no data');return;}
  var header=rows[0].map(function(h){return (h||'').toString().trim().toLowerCase();});

  function col(names){
    for(var ni=0;ni<names.length;ni++){
      var idx=header.indexOf(names[ni]);
      if(idx>=0) return idx;
    }
    return -1;
  }

  /* Detect Name vs Name+Surname columns */
  var ciFirst=col(['first name','firstname','prenom','first']);
  var ciLast=col(['last name','lastname','surname','nom de famille','last']);
  var ciName=col(['name','nom','worker','worker name','full name']);
  var ciId=col(['id','worker id','employee id','matricule','staff id']);
  var ciCo=col(['company','entreprise','employer','société','societe']);
  var ciSpec=col(['specialty','specialite','speciality','trade','metier']);
  var ciStart=col(['contract start','start','date debut','debut','start date','date de debut']);
  var ciEnd=col(['contract end','end','date fin','fin','end date','date de fin','fin contrat']);
  var ciRev=col(['revised end','fin revisee','revised','prolongation','new end','fin revisee']);

  var hasFirstLast=(ciFirst>=0&&ciLast>=0);
  if(!hasFirstLast&&ciName<0){
    alert('Column "Name" not found. Headers: '+header.join(', '));
    return;
  }

  /* Build specialty map from current S.specs + common aliases */
  function matchSpec(raw){
    if(!raw) return '';
    var up=raw.trim().toUpperCase();
    /* Try exact key match first */
    for(var i=0;i<SPECS.length;i++) if(SPECS[i].key===up) return SPECS[i].key;
    /* Try label match */
    for(var i=0;i<SPECS.length;i++) if(up.indexOf(SPECS[i].key)>=0) return SPECS[i].key;
    /* Try label partial */
    for(var i=0;i<SPECS.length;i++) if(up.indexOf(SPECS[i].label.toUpperCase().slice(0,4))>=0) return SPECS[i].key;
    /* Legacy aliases */
    if(up.indexOf('CARP')>=0) return 'CARP';
    if(up.indexOf('STEEL')>=0||up.indexOf('FIX')>=0) return 'STEEL';
    if(up.indexOf('HELP')>=0) return 'HELP';
    if(up.indexOf('FINISH')>=0) return 'FINISH';
    return '';
  }

  /* Robust date parsing that handles Excel serials AND text */
  function robustDate(val){
    if(!val&&val!==0) return null;
    /* SheetJS with {raw:false,dateNF:'DD/MM/YYYY'} returns date strings */
    if(typeof val==='string'){
      var s=val.trim();
      if(!s) return null;
      /* DD/MM/YYYY */
      var p=s.split('/');
      if(p.length===3&&p[0].length<=2){
        var d=new Date(+p[2],+p[1]-1,+p[0]);
        if(!isNaN(d.getTime())) return d;
      }
      /* YYYY-MM-DD */
      var d2=new Date(s);
      if(!isNaN(d2.getTime())) return d2;
      /* MM/DD/YYYY fallback */
      var p2=s.split('/');
      if(p2.length===3){var d3=new Date(+p2[2],+p2[0]-1,+p2[1]);if(!isNaN(d3.getTime())) return d3;}
    }
    if(typeof val==='number'&&val>0){
      /* Excel serial: days since 1900-01-01, with Lotus bug correction */
      var serial=val>60?val-1:val; /* remove Lotus 1900 bug */
      var msPerDay=86400000;
      var epoch=new Date(1899,11,31).getTime(); /* Dec 31 1899 */
      var d=new Date(epoch+serial*msPerDay);
      if(!isNaN(d.getTime())) return d;
    }
    if(val instanceof Date&&!isNaN(val.getTime())) return val;
    return null;
  }

  var imported=0,updated=0,skipped=0;
  for(var ri=1;ri<rows.length;ri++){
    var row=rows[ri];
    /* Build full name */
    var name='';
    if(hasFirstLast){
      var fn=(row[ciFirst]||'').toString().trim();
      var ln=(row[ciLast]||'').toString().trim();
      name=(fn+' '+ln).trim();
    } else {
      name=(row[ciName]||'').toString().trim();
    }
    if(!name){skipped++;continue;}

    var workerId=ciId>=0?(row[ciId]||'').toString().trim():'';
    var coName=ciCo>=0?(row[ciCo]||'').toString().trim():'';
    var specRaw=ciSpec>=0?(row[ciSpec]||'').toString():'';
    var specKey=matchSpec(specRaw);

    var co=getCompanyByName(coName);
    var companyId=co?co.id:''; /* empty = no company (valid for EUR-only) */

    var dateStart=robustDate(ciStart>=0?row[ciStart]:null);
    var dateEnd=robustDate(ciEnd>=0?row[ciEnd]:null);
    var dateRev=robustDate(ciRev>=0?row[ciRev]:null);

    /* Match existing by workerId first, then by name */
    var existing=null;
    if(workerId){for(var wi=0;wi<S.workers.length;wi++) if(S.workers[wi].workerId===workerId){existing=S.workers[wi];break;}}
    if(!existing){for(var wi=0;wi<S.workers.length;wi++) if(S.workers[wi].name===name){existing=S.workers[wi];break;}}

    var wk={
      id:existing?existing.id:uid(),
      workerId:workerId,
      name:name,
      companyId:companyId,
      spec:specKey,
      dateDebut:dateStart?dateStart.toISOString():null,
      dateFinContrat:dateEnd?dateEnd.toISOString():null,
      dateFinRevisee:dateRev?dateRev.toISOString():null
    };

    if(existing){
      S.workers[S.workers.indexOf(existing)]=wk;
      updated++;
    } else {
      S.workers.push(wk);
      imported++;
    }
  }
  saveS();render();
  alert('Import done: '+imported+' new, '+updated+' updated'+(skipped?' ('+skipped+' blank rows skipped)':'')+'.');
}

   WORKER PICKER (inline dropdown)
   ============================================================ */
var pickerOpen=null;
function openWP(el){openWorkerPicker(el,el.dataset.wbs,parseInt(el.dataset.m));}
function openWorkerPicker(btn,wbsId,month){
  /* Close any existing picker */
  var old=document.getElementById('wpicker');
  if(old) old.parentNode.removeChild(old);
  if(pickerOpen&&pickerOpen.wbsId===wbsId&&pickerOpen.month===month){pickerOpen=null;return;}
  pickerOpen={wbsId:wbsId,month:month};

  /* Available workers: active this slot, not already assigned anywhere */
  var slotYr=ML[month]?ML[month].year:YEAR;
  var slotMo=ML[month]!==undefined?ML[month].month:month;
  var available=[];
  for(var i=0;i<S.workers.length;i++){
    var wk=S.workers[i];
    if(!workerActiveInMonth(wk,slotMo,slotYr)) continue;
    if(getAssignmentSlot(wk.id,month)) continue; /* already assigned */
    available.push(wk);
  }

  var div=document.createElement('div');
  div.id='wpicker';
  div.className='wpick';

  /* Foreman checkbox at top */
  var fmRow=document.createElement('div');
  fmRow.className='wpick-fm';
  fmRow.innerHTML='<input type="checkbox" id="wpFm"><label for="wpFm" style="cursor:pointer">&#9733; Assign as Foreman</label>';
  div.appendChild(fmRow);

  if(available.length===0){
    div.innerHTML='<div class="wpick-item"><span class="wi-name" style="color:var(--tx3)">No available workers this month</span></div>';
  } else {
    for(var i=0;i<available.length;i++){
      (function(wk){
        var item=document.createElement('div');
        item.className='wpick-item';
        var co=getCompany(wk.companyId);
        var coName=co?co.name:'';
        var sl=specLabel(wk.spec);
        item.innerHTML='<div><div class="wi-name">'+wk.name+'</div><div class="wi-spec">'+coName+(sl?' / '+sl:'')+'</div></div>';
        item.onclick=function(){
          var isFm=document.getElementById('wpFm')&&document.getElementById('wpFm').checked;
          assignWorker(wk.id,wbsId,month,isFm);
          pickerOpen=null;
          render();
        };
        div.appendChild(item);
      })(available[i]);
    }
  }

  /* Close on outside click */
  setTimeout(function(){
    document.addEventListener('click',function closePicker(e){
      if(!div.contains(e.target)&&e.target!==btn){
        if(div.parentNode) div.parentNode.removeChild(div);
        document.removeEventListener('click',closePicker);
        pickerOpen=null;
      }
    });
  },0);

  btn.parentNode.style.position='relative';
  btn.parentNode.appendChild(div);
}

function remAssign(el){removeAssignment(el.dataset.wid,parseInt(el.dataset.m));}
function removeAssignment(workerId,month){
  if(!confirm('Remove this worker from this month?')) return;
  var rYr=ML[month]?ML[month].year:YEAR;
  var rMo=ML[month]!==undefined?ML[month].month:month;
  S.assignments=S.assignments.filter(function(a){
    return !(a.workerId===workerId&&a.month===rMo&&a.year===rYr);
  });
  render();
}

function saveWorkerModal(id){
  var name=gv('mwname').trim();
  if(!name){alert('Name is required');return;}
  var cid=gv('mwco');
  var spec=gv('mwsp');
  var startRaw=gv('mwstart').trim();
  var endRaw=gv('mwend').trim();
  var revRaw=gv('mwrev').trim();

  function parseDMY(s){
    if(!s) return null;
    var p=s.split('/');
    if(p.length===3) return new Date(+p[2],+p[1]-1,+p[0]);
    return parseDate(s);
  }

  var ds=parseDMY(startRaw);
  var de=parseDMY(endRaw);
  var dr=parseDMY(revRaw);

  if(id){
    /* Edit existing */
    for(var i=0;i<S.workers.length;i++){
      if(S.workers[i].id===id){
        S.workers[i].name=name;
        S.workers[i].companyId=cid;
        S.workers[i].spec=spec;
        S.workers[i].dateDebut=ds?ds.toISOString():null;
        S.workers[i].dateFinContrat=de?de.toISOString():null;
        S.workers[i].dateFinRevisee=dr?dr.toISOString():null;
        break;
      }
    }
  } else {
    /* New worker */
    S.workers.push({
      id:uid(),name:name,companyId:cid,spec:spec,
      dateDebut:ds?ds.toISOString():null,
      dateFinContrat:de?de.toISOString():null,
      dateFinRevisee:dr?dr.toISOString():null
    });
  }
  closeModal();
  render();
}

function toggleSug(){

function renderSugList(){
  var list=document.getElementById('sugList');
  if(!list) return;
  var items=S.suggestions||[];
  if(!items.length){list.innerHTML='<div style="font-size:11px;color:var(--tx3);padding:6px 0">No suggestions yet.</div>';return;}
  var h='';
  for(var i=items.length-1;i>=0;i--){
    h+='<div class="sug-item"><span>'+items[i].text+'<br><span style="font-size:10px;color:var(--tx3)">'+items[i].date+'</span></span>';
    h+='<span class="sug-del" onclick="delSug('+i+')">&#128465;</span></div>';
  }
  list.innerHTML=h;
}
function submitSug(){
  var txt=document.getElementById('sugText').value.trim();
  if(!txt) return;
  if(!S.suggestions) S.suggestions=[];
  var now=new Date();
  S.suggestions.push({text:txt,date:now.getDate()+'/'+(now.getMonth()+1)+'/'+now.getFullYear()});
  document.getElementById('sugText').value='';
  saveS();
  renderSugList();
}
function delSug(idx){
  if(!S.suggestions) return;
  S.suggestions.splice(idx,1);
  saveS();
  renderSugList();
}

  h+='<button class="btn soft" onclick="addSpec()" style="width:100%;justify-content:center;margin-top:4px">+ Add Specialty</button>';
  h+='<div class="ma"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn pri" onclick="saveSettings()">Save</button></div>';

  box.innerHTML=h;
  document.getElementById('mbg').style.display='flex';
}

function updateSpec(i,field,val){
  if(!S.specs[i]) return;
  S.specs[i][field]=val.trim();
  /* Update companies tarifs to include new key if needed */
}

function removeSpec(i){
  if(S.specs.length<=1){alert('At least one specialty required.');return;}
  S.specs.splice(i,1);
  openSettingsModal(); /* re-render */
}

function addSpec(){
  S.specs.push({key:'NEW',label:'New Specialty'});
  openSettingsModal();
}

function saveSettings(){
  var y=parseInt(document.getElementById('sYear').value)||2025;
  var sm=parseInt(document.getElementById('sStartM').value)||0;
  S.settings.startYear=y;
  S.settings.startMonth=sm;
  S.settings.endYear=parseInt(document.getElementById('sEndY').value)||y;
  S.settings.endMonth=parseInt(document.getElementById('sEndM').value)||11;
  /* validate: end must be after start */
  if(S.settings.endYear<y||(S.settings.endYear===y&&S.settings.endMonth<sm)){
    S.settings.endYear=y; S.settings.endMonth=11;
  }
  /* Specs are updated live via updateSpec */
  /* Ensure companies have tarifs for all specs */
  for(var ci=0;ci<S.companies.length;ci++){
    for(var si=0;si<S.specs.length;si++){
      var k=S.specs[si].key;
      if(S.companies[ci].tarifs[k]===undefined) S.companies[ci].tarifs[k]=0;
    }
  }
  closeModal();
  render();
}

/* ============================================================
   EXPORT
   ============================================================ */
function exportCSV(){
  var csv='Code;WBS;Company;Specialty;PU;Row;TOTAL;'+MS.map(function(m){return m+' '+YEAR;}).join(';')+'\n';
  for(var i=0;i<S.wbs.length;i++){
    var w=S.wbs[i]; var c=getCompany(w.companyId); var cn=c?c.name:'?'; var sl=specLabel(w.spec);
    var rows=[['Budget',function(m){return bud(w,m);}],['Actual',function(m){return m<=S.ccM?reel(w,m):0;}],['ETC',function(m){return m>S.ccM?rad(w,m):0;}]];
    for(var ri=0;ri<rows.length;ri++){
      var tot=0,vals=[];for(var m=0;m<NM;m++){var v=rows[ri][1](m);tot+=v;vals.push(v.toFixed(1));}
      csv+=w.code+';'+w.name+';'+cn+';'+sl+';'+w.pu+';'+rows[ri][0]+';'+tot.toFixed(1)+';'+vals.join(';')+'\n';
    }
  }
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download='budget_hh_'+YEAR+'.csv';a.click();
}

/* ============================================================
   INIT
   ============================================================ */
function loadLocalFallback(){
  try{var r=localStorage.getItem('hht8');if(!r)return null;return migrate(JSON.parse(r));}catch(e){return null;}
}
/* S starts with local data while Firebase loads */
var S = loadLocalFallback() || buildDefault();
applySettings();
/* Start Firebase sync when DOM is ready */
document.addEventListener('DOMContentLoaded', function(){
  render(); /* Show local data immediately */
  initFirebase(); /* Then connect to Firebase */
});
</script>
